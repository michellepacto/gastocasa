function periodRange(period,now){
  const y=now.getFullYear(),m=now.getMonth();
  if(period==="thisMonth")return {from:ymd(new Date(y,m,1)),to:ymd(new Date(y,m+1,0)),label:now.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})};
  if(period==="lastMonth"){const d=new Date(y,m-1,1);return {from:ymd(d),to:ymd(new Date(y,m,0)),label:d.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})};}
  if(period==="last3"){const d=new Date(y,m-2,1);return {from:ymd(d),to:ymd(new Date(y,m+1,0)),label:"Últimos 3 meses"};}
  if(period==="thisYear")return {from:ymd(new Date(y,0,1)),to:ymd(new Date(y,11,31)),label:y+""};
  if(period==="all")return {from:"1900-01-01",to:"2999-12-31",label:"Todo o período"};
  return {from:ymd(new Date(y,m,1)),to:ymd(new Date(y,m+1,0)),label:"Este mês"};
}

function shiftPeriodPrev(period,now){
  const y=now.getFullYear(),m=now.getMonth();
  if(period==="thisMonth")return {from:ymd(new Date(y,m-1,1)),to:ymd(new Date(y,m,0))};
  if(period==="lastMonth")return {from:ymd(new Date(y,m-2,1)),to:ymd(new Date(y,m-1,0))};
  if(period==="last3")return {from:ymd(new Date(y,m-5,1)),to:ymd(new Date(y,m-2,0))};
  if(period==="thisYear")return {from:ymd(new Date(y-1,0,1)),to:ymd(new Date(y-1,11,31))};
  return null;
}

async function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const s=Math.min(1,1200/img.width);
        c.width=img.width*s;c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function recompressBase64(base64,mimeType){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      const s=Math.min(1,1200/img.width);
      c.width=img.width*s;c.height=img.height*s;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
    };
    img.onerror=rej;
    img.src="data:"+(mimeType||"image/jpeg")+";base64,"+base64;
  });
}

async function api(url,action,params={}){
  if(!url)throw new Error("URL não configurada");
  // Retry automático: até 4 tentativas com backoff exponencial
  // Útil para "Failed to fetch", timeouts, e erros transitórios do Apps Script
  let lastError=null;
  for(let attempt=0;attempt<4;attempt++){
    try{
      let r;
      if(action==="getAll"||action==="listUploads"||action==="ensureUpload"){
        const qs=new URLSearchParams({action,t:Date.now(),...params}).toString();
        r=await fetch(`${url}?${qs}`);
      }else{
        r=await fetch(url,{method:"POST",body:JSON.stringify({action,...params})});
      }
      if(!r.ok)throw new Error("Erro "+r.status);
      return await r.json();
    }catch(err){
      lastError=err;
      // Não tenta novamente em erros de URL/configuração
      if(err.message.includes("URL não configurada"))throw err;
      // Última tentativa? joga o erro
      if(attempt===3)throw err;
      // Backoff: 1s, 3s, 6s
      const waitMs=[1000,3000,6000][attempt];
      await new Promise(r=>setTimeout(r,waitMs));
    }
  }
  throw lastError;
}

// Tenta parsear JSON; se vier cortado/quebrado, tenta recuperar
function safeJsonParse(s){
  try{return JSON.parse(s);}catch(err){
    // Tenta recuperar JSON truncado
    let attempt=s.trim();
    
    // Se tem string aberta sem fechar, fecha aspas
    const quotes=(attempt.match(/"/g)||[]).length;
    if(quotes%2===1)attempt+='"';
    
    // Se tem array aberto sem fechar
    const openBrackets=(attempt.match(/\[/g)||[]).length;
    const closeBrackets=(attempt.match(/\]/g)||[]).length;
    for(let i=0;i<openBrackets-closeBrackets;i++)attempt+=']';
    
    // Se tem objeto aberto sem fechar
    const openBraces=(attempt.match(/\{/g)||[]).length;
    const closeBraces=(attempt.match(/\}/g)||[]).length;
    for(let i=0;i<openBraces-closeBraces;i++)attempt+='}';
    
    try{return JSON.parse(attempt);}catch(err2){
      // Ainda falhou — tenta extrair só os campos básicos com regex
      const merchant=s.match(/"merchant"\s*:\s*"([^"]*)"/);
      const total=s.match(/"total"\s*:\s*([\d.]+)/);
      const date=s.match(/"date"\s*:\s*"([^"]*)"/);
      const category=s.match(/"category"\s*:\s*"([^"]*)"/);
      if(merchant||total||date){
        return {
          merchant:merchant?merchant[1]:"",
          total:total?parseFloat(total[1]):0,
          date:date?date[1]:"",
          category:category?category[1]:"",
          items:[]
        };
      }
      throw new Error("Resposta da IA inválida (tente novamente)");
    }
  }
}

// ─── CSV PARSING ─────────────────────────────────────────────
function parseCSVLine(line){
  const result=[];
  let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur);cur="";}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return {headers:[],rows:[]};
  const headers=parseCSVLine(lines[0]).map(h=>h.trim());
  const rows=lines.slice(1).map(l=>parseCSVLine(l));
  return {headers,rows};
}

// Detecta formato baseado nas primeiras linhas
function detectCSVFormat(text){
  const head=text.slice(0,500).toLowerCase();
  const firstLine=(text.split(/\r?\n|\r/)[0]||"").toLowerCase();
  if(firstLine.startsWith("date,title,amount"))return "nubank_card";
  if(firstLine.startsWith("data,valor,identificador,descrição")||firstLine.startsWith("data,valor,identificador"))return "nubank_cc";
  // Bradesco cartão: começa com "Data: DD/MM/YYYY" e tem "Situação da Fatura"
  if(head.includes("situação da fatura")||head.includes("situacao da fatura"))return "bradesco_card";
  // Bradesco CC: começa com "Extrato de: Ag:"
  if(firstLine.startsWith("extrato de: ag")||head.includes("extrato de: ag:"))return "bradesco_cc";
  return null;
}

// Parser CSV com separador customizável
function parseCSVLineGen(line,sep){
  const result=[];
  let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===sep&&!inQ){result.push(cur);cur="";}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}

// Converte valor brasileiro "1.234,56" para 1234.56
function parseBrValue(s){
  if(!s)return 0;
  const cleaned=String(s).replace(/[^\d,.\-]/g,"").replace(/\./g,"").replace(",",".");
  const v=parseFloat(cleaned);
  return isNaN(v)?0:v;
}

// Detecta parcelas Bradesco: "TITULO X/Y" no final
function detectInstallmentBradesco(title){
  const m=title.match(/^(.+?)\s+(\d{1,2})\/(\d{1,2})\s*$/);
  if(!m)return null;
  const cur=parseInt(m[2]),tot=parseInt(m[3]);
  // Sanity: parcela não pode ter mais de 36, current <= total
  if(cur<1||tot<2||tot>36||cur>tot)return null;
  return {clean:m[1].trim(),current:cur,total:tot};
}

// Parser Bradesco Cartão (fatura)
function parseBradescoCard(text,accountId){
  // Linhas separadas por \r (Mac) ou \n
  const lines=text.split(/\r\n|\r|\n/);
  const items=[];
  
  // Descobre ano de referência pelo header "Data: DD/MM/YYYY"
  let refYear=new Date().getFullYear();
  let refMonth=new Date().getMonth()+1;
  for(const line of lines){
    const m=line.match(/^Data:\s*(\d{2})\/(\d{2})\/(\d{4})/i);
    if(m){refMonth=parseInt(m[2]);refYear=parseInt(m[3]);break;}
  }
  
  // Detecta linhas de transação: começam com DD/MM;TITULO;...;VALOR
  const txRegex=/^(\d{2})\/(\d{2});(.+?);([\d,.-]*);(-?[\d,.-]+)\s*;?\s*$/;
  
  for(const rawLine of lines){
    const line=rawLine.trim();
    if(!line)continue;
    if(line.toLowerCase().startsWith("data:"))continue;
    if(line.toLowerCase().startsWith("data;"))continue; // header
    if(line.toLowerCase().includes("situação da fatura"))continue;
    if(line.toLowerCase().includes("michelle r nunes"))continue;
    if(line.toLowerCase().startsWith("total da fatura"))continue;
    if(line.toLowerCase().startsWith("resumo"))continue;
    if(line.toLowerCase().startsWith("saldo anterior"))continue;
    if(line.toLowerCase().startsWith("(-)"))continue;
    if(line.toLowerCase().startsWith("(+)"))continue;
    if(line.toLowerCase().startsWith("(=)"))continue;
    if(line.toLowerCase().startsWith("cotação"))continue;
    if(line.toLowerCase().startsWith("cotacao"))continue;
    if(line.toLowerCase().startsWith("taxas"))continue;
    if(line.toLowerCase().startsWith("descrição;"))continue;
    if(line.toLowerCase().includes("pagto. por deb"))continue;
    if(line.toLowerCase().includes("custo trans"))continue;
    if(line.toLowerCase().includes("saldo anterior"))continue;
    
    const m=line.match(txRegex);
    if(!m)continue;
    
    const day=parseInt(m[1]);
    const month=parseInt(m[2]);
    let title=m[3].trim();
    const valor=parseBrValue(m[5]);
    
    if(!title||valor===0)continue;
    if(valor<0)continue; // estornos
    if(title.toLowerCase().includes("saldo anterior"))continue;
    if(title.toLowerCase().includes("pagto. por deb"))continue;
    
    // Inferir ano: se mês <= refMonth, é refYear; senão, refYear-1
    const year=month<=refMonth?refYear:refYear-1;
    const date=`${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    
    // Detectar parcela "TITULO X/Y"
    const inst=detectInstallmentBradesco(title);
    let totalAmount=valor;let status="pendente";let reason="";let installment="";let cleanTitle=title;
    
    if(inst){
      cleanTitle=inst.clean;
      installment=inst.current+"/"+inst.total;
      if(inst.current===1){
        totalAmount=+(valor*inst.total).toFixed(2);
        reason="Compra parcelada em "+inst.total+"× (total estimado)";
      }else{
        status="ignorada";
        reason="Parcela "+inst.current+"/"+inst.total+" — já contada na compra original";
      }
    }
    
    const hash=hashStr(accountId+"|"+date+"|"+cleanTitle+"|"+valor.toFixed(2));
    items.push({accountId,date,title:cleanTitle,originalAmount:valor,totalAmount,status,reason,installment,hash});
  }
  return items;
}

// Parser Bradesco CC (extrato)
function parseBradescoCC(text,accountId,payers){
  const lines=text.split(/\r\n|\r|\n/);
  const items=[];
  const payerNamesLower=(payers||[]).map(p=>p.toLowerCase()).filter(Boolean);
  
  // Estado: tx atual sendo construída
  let currentTx=null;
  
  // Tipos de histórico que IGNORAMOS automaticamente
  const ignorePatterns=[
    "resgate inv","resg/vencto","resg.invest","rent.inv","rent. inv","rentab.inv",
    "apl.invest","apl. invest","aplicacao cdb","aplicação cdb","bx.ant.fin",
    "iof util","iof s/","enc lim","encargos","custo trans",
    "gasto c credito","gasto c. credito","gastos cartao",
    "saldo anterior","saldo invest","saldo:",
    "receb pagfor","devolucao pix","devolução pix",
    "cod. lanc","código lanc"
  ];
  
  // Tipos que são DESPESA potencial (precisam revisão)
  // Padrões para extrair nome de estabelecimento da linha de detalhe
  
  function pushCurrent(){
    if(!currentTx)return;
    if(currentTx._skip){currentTx=null;return;}
    items.push(currentTx);
    currentTx=null;
  }
  
  for(const rawLine of lines){
    const line=rawLine.replace(/[\r\n]+$/,"");
    if(!line)continue;
    
    // Skip linhas de cabeçalho/sumário
    const lower=line.toLowerCase().trim();
    if(lower.startsWith("extrato de:"))continue;
    if(lower.startsWith("data;histórico"))continue;
    if(lower.startsWith("data;historico"))continue;
    if(lower.startsWith("os dados acima"))continue;
    if(lower.startsWith("últimos lançamentos"))continue;
    if(lower.startsWith("ultimos lançamentos"))continue;
    if(lower.startsWith("saldos invest"))continue;
    if(lower.startsWith(";total;"))continue;
    if(lower.startsWith("total;"))continue;
    if(/^\d{2}\/\d{2}\/\d{2};saldo anterior/i.test(line)){currentTx=null;continue;}
    
    const cols=parseCSVLineGen(line,";");
    if(cols.length<2)continue;
    
    const dataField=(cols[0]||"").trim();
    
    // Linha principal: tem data DD/MM/YY
    const dm=dataField.match(/^(\d{2})\/(\d{2})\/(\d{2})$/);
    if(dm){
      // Salva tx anterior se houver
      pushCurrent();
      
      const date=`20${dm[3]}-${dm[2]}-${dm[1]}`;
      const histor=(cols[1]||"").trim();
      const credito=parseBrValue(cols[3]||"");
      const debitoRaw=parseBrValue(cols[4]||"");
      const debito=Math.abs(debitoRaw); // Bradesco coloca débito como negativo
      
      // Verifica se é tipo a ignorar
      const histLower=histor.toLowerCase();
      let shouldSkip=false;
      for(const pat of ignorePatterns){
        if(histLower.includes(pat)){shouldSkip=true;break;}
      }
      
      // Saldo anterior, transferências entre própria conta, etc.
      if(histLower==="saldo anterior")shouldSkip=true;
      
      // Se é crédito (entrada) sem débito, é receita → ignorar
      const isCredit=credito>0&&debito===0;
      const isDebit=debito>0;
      
      if(!isCredit&&!isDebit){
        // Linha sem valor (provavelmente cabeçalho residual)
        currentTx=null;
        continue;
      }
      
      currentTx={
        accountId,date,
        histor,
        amount:isDebit?debito:credito,
        isCredit,
        detail:"",
        _skip:shouldSkip||isCredit, // ignora créditos por padrão
        _skipReason:shouldSkip?"Movimentação interna/encargo":"Receita / transferência recebida"
      };
    }else if(dataField===""&&currentTx){
      // Linha de continuação (detalhe)
      const detail=(cols[1]||"").trim();
      if(detail&&!detail.startsWith("Os dados")){
        currentTx.detail=(currentTx.detail?currentTx.detail+" ":"")+detail;
      }
    }
  }
  pushCurrent();
  
  // Agora classifica/transforma cada tx em formato final
  return items.map(tx=>{
    // Construir título legível
    let title=tx.histor;
    let reason="";
    let status="pendente";
    
    const histLower=tx.histor.toLowerCase();
    const detailLower=tx.detail.toLowerCase();
    
    // Se já marcado como skip
    if(tx._skip){
      status="ignorada";
      reason=tx._skipReason||"Ignorada automaticamente";
      title=tx.detail||tx.histor;
    }else{
      // Pix transfers: extrair destinatário
      if(histLower.includes("pix")){
        // Padrão: "Des: NOME DA PESSOA DD/MM"
        const desMatch=tx.detail.match(/Des:\s*(.+?)(?:\s+\d{2}\/\d{2})?$/i);
        if(desMatch){
          title=desMatch[1].trim();
          // Verifica se é pix entre cadastrados
          const titleLower=title.toLowerCase();
          for(const pn of payerNamesLower){
            if(pn&&titleLower.includes(pn)){
              status="ignorada";
              reason="Pix para pessoa cadastrada ("+pn+")";
              break;
            }
          }
          // Pix recebido (Rem) — não deveria chegar aqui mas por segurança
          const remMatch=tx.detail.match(/Rem:\s*(.+?)(?:\s+\d{2}\/\d{2})?$/i);
          if(remMatch&&!desMatch){
            status="ignorada";
            reason="Pix recebido (receita)";
          }
        }else{
          title=tx.detail||tx.histor;
        }
      }
      // Visa Electron, Comp Debit App: detalhe é o estabelecimento
      else if(histLower.includes("visa electron")||histLower.includes("comp debit")||histLower.includes("cartao visa")){
        title=tx.detail||tx.histor;
      }
      // Contas (luz, gás, telefone, TV)
      else if(histLower.includes("conta de luz")||histLower.includes("conta de gas")||histLower.includes("conta telefone")||histLower.includes("tv p/assinatura")){
        title=tx.histor.replace(/conta\s+de\s+/i,"").replace(/tv p\/assinatura/i,"TV").trim();
        if(tx.detail)title+=" - "+tx.detail.split("-")[0].trim();
      }
      // Pagamentos cobrança
      else if(histLower.includes("pagto cobranca")||histLower.includes("pagto. cobranca")){
        title=tx.detail||tx.histor;
      }
      // Financiamentos
      else if(histLower.includes("prest fin imob")){
        title="Financiamento Imobiliário";
      }
      else if(histLower.includes("parc cred pess")){
        title="Empréstimo - Parcela";
      }
      else{
        title=tx.detail||tx.histor;
      }
    }
    
    // Limpa título
    title=title.replace(/\s+/g," ").trim();
    if(title.length>80)title=title.slice(0,80);
    
    const hash=hashStr(accountId+"|"+tx.date+"|"+title.slice(0,40)+"|"+tx.amount.toFixed(2));
    return {
      accountId,
      date:tx.date,
      title,
      originalAmount:tx.amount,
      totalAmount:tx.amount,
      status,
      reason,
      installment:"",
      hash
    };
  });
}

// Hash simples para dedupe
function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;
  return Math.abs(h).toString(36);
}

// Detecta " - Parcela X/Y" no título
function detectInstallment(title){
  const m=title.match(/^(.+?)\s*-\s*Parcela\s+(\d+)\/(\d+)$/i);
  if(!m)return null;
  return {clean:m[1].trim(),current:parseInt(m[2]),total:parseInt(m[3])};
}

// Parser CSV cartão Nubank
// Aplica lógica de parcelas: Parcela 1/N → cria com valor*N; Parcelas 2+ → marcadas como "parcela_subsequente"
function parseNubankCard(text,accountId){
  const {rows}=parseCSV(text);
  const items=[];
  for(const r of rows){
    if(r.length<3)continue;
    const date=r[0]?.trim();
    const title=r[1]?.trim();
    const amount=parseFloat(r[2]);
    if(!date||!title||isNaN(amount))continue;
    if(amount<0)continue; // estornos: ignora
    
    const inst=detectInstallment(title);
    let totalAmount=amount;
    let status="pendente";
    let reason="";
    let installment="";
    let cleanTitle=title;
    
    if(inst){
      cleanTitle=inst.clean;
      installment=inst.current+"/"+inst.total;
      if(inst.current===1){
        // Compra original → calcular total (estimativa)
        totalAmount=+(amount*inst.total).toFixed(2);
        reason="Compra parcelada em "+inst.total+"× (total estimado)";
      }else{
        // Parcela seguinte → não lançar como nova despesa
        status="ignorada";
        reason="Parcela "+inst.current+"/"+inst.total+" — já contada na compra original";
      }
    }
    
    const hash=hashStr(accountId+"|"+date+"|"+cleanTitle+"|"+amount.toFixed(2));
    items.push({accountId,date,title:cleanTitle,originalAmount:amount,totalAmount,status,reason,installment,hash});
  }
  return items;
}

// Parser CC Nubank
function parseNubankCC(text,accountId,payers){
  const {rows}=parseCSV(text);
  const items=[];
  const payerNamesLower=(payers||[]).map(p=>p.toLowerCase());
  
  for(const r of rows){
    if(r.length<4)continue;
    const dateBR=r[0]?.trim(); // DD/MM/YYYY
    const valor=parseFloat(r[1]);
    const desc=r[3]?.trim();
    if(!dateBR||isNaN(valor)||!desc)continue;
    
    // Converte data DD/MM/YYYY → YYYY-MM-DD
    const dm=dateBR.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if(!dm)continue;
    const date=`${dm[3]}-${dm[2]}-${dm[1]}`;
    
    const isOutgoing=valor<0;
    const absValor=Math.abs(valor);
    
    // Filtros automáticos
    let status="pendente";
    let reason="";
    
    const descLower=desc.toLowerCase();
    
    if(descLower.includes("pagamento de fatura")){
      status="ignorada";
      reason="Pagamento de fatura — já está nas faturas do cartão";
    }else if(!isOutgoing){
      // Entrada (Pix recebido, transferência recebida)
      status="ignorada";
      reason="Receita / transferência recebida";
    }else{
      // Saída — verifica se é Pix entre cadastrados
      const isPix=descLower.includes("pix");
      if(isPix){
        for(const pn of payerNamesLower){
          if(pn&&descLower.includes(pn)){
            status="ignorada";
            reason="Pix para pessoa cadastrada ("+pn+")";
            break;
          }
        }
      }
    }
    
    // Limpa título
    let title=desc;
    const pixDes=desc.match(/DES:\s*(.+?)(?:\s+\d{2}\/\d{2})?$/i);
    if(pixDes)title=pixDes[1].trim();
    title=title.replace(/\s+\d{2}\/\d{2}$/,"").trim();
    if(title.length>80)title=title.slice(0,80);
    
    const hash=hashStr(accountId+"|"+date+"|"+desc.slice(0,40)+"|"+absValor.toFixed(2));
    items.push({
      accountId,date,title,
      originalAmount:absValor,
      totalAmount:absValor,
      status,reason,installment:"",hash
    });
  }
  return items;
}

// Detecção de duplicatas vs expenses existentes
function findDuplicateExpense(imp,expenses){
  const tol=1.0; // R$ 1
  const titleLower=(imp.title||"").toLowerCase();
  for(const e of expenses){
    if(e.date!==imp.date)continue;
    if(Math.abs((+e.total||0)-imp.totalAmount)>tol)continue;
    const merchLower=(e.merchant||"").toLowerCase();
    if(!merchLower||!titleLower)continue;
    // Match: contém uma palavra significativa em comum
    const words1=titleLower.split(/\s+/).filter(w=>w.length>3);
    const words2=merchLower.split(/\s+/).filter(w=>w.length>3);
    for(const w of words1){
      if(words2.includes(w))return e;
    }
  }
  return null;
}

// Normaliza string para chave de penalty (igual no servidor)
function normMatchKey(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
}

// ─── RECONCILIATION ─────────────────────────────────────────
// Calcula score de match entre uma despesa e um import (0-100)
// penalties: mapa {chave: número de desvínculos prévios} — cada um tira 15 pontos
function matchScore(expense,imp,penalties){
  if(!expense||!imp)return 0;
  
  // 1. Valor (crítico, ±R$1)
  const valDiff=Math.abs((+expense.total||0)-(+imp.totalAmount||0));
  if(valDiff>1.0)return 0; // sem chance se valor diverge muito
  const valScore=valDiff<0.01?40:valDiff<0.50?35:25;
  
  // 2. Data (±3 dias)
  if(!expense.date||!imp.date)return 0;
  const d1=new Date(expense.date+"T12:00");
  const d2=new Date(imp.date+"T12:00");
  const dayDiff=Math.abs((d1-d2)/86400000);
  if(dayDiff>3)return 0;
  const dateScore=dayDiff<0.5?30:dayDiff<=1?25:dayDiff<=2?15:8;
  
  // 3. Estabelecimento (palavras em comum)
  const normalize=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  const m1=normalize(expense.merchant);
  const m2=normalize(imp.title);
  let nameScore=0;
  if(m1&&m2){
    const words1=m1.split(/\s+/).filter(w=>w.length>2);
    const words2=m2.split(/\s+/).filter(w=>w.length>2);
    let common=0;
    for(const w of words1){
      if(words2.some(w2=>w2.includes(w)||w.includes(w2)))common++;
    }
    nameScore=common===0?0:common===1?15:30;
  }
  
  let score=valScore+dateScore+nameScore;
  
  // Aplica penalty: cada desvínculo prévio = -15 pontos
  if(penalties&&expense.merchant&&imp.title){
    const key=normMatchKey(expense.merchant)+"|"+normMatchKey(imp.title);
    const pen=penalties[key]||0;
    score=Math.max(0,score-pen*15);
  }
  
  return score;
}

// Busca matches em uma lista de imports para uma expense
function findImportMatches(expense,imports,minScore=50,penalties){
  if(!expense||!imports)return [];
  const matches=[];
  for(const imp of imports){
    if(imp.status==="vinculada"||imp.status==="lancada")continue;
    if(imp.status==="ignorada")continue;
    const score=matchScore(expense,imp,penalties);
    if(score>=minScore)matches.push({imp,score});
  }
  matches.sort((a,b)=>b.score-a.score);
  return matches;
}

// Busca matches em uma lista de expenses para um import
function findExpenseMatches(imp,expenses,minScore=50,penalties){
  if(!imp||!expenses)return [];
  const matches=[];
  for(const exp of expenses){
    if(exp.importId)continue; // já vinculado
    const score=matchScore(exp,imp,penalties);
    if(score>=minScore)matches.push({exp,score});
  }
  matches.sort((a,b)=>b.score-a.score);
  return matches;
}

function isStrongMatch(score){return score>=80;}

// ─── IMPORT VIEW ─────────────────────────────────────────────
function ImportView({accounts,imports,expenses,cats,payers,lmap,scriptUrl,onAddAccount,onDeleteAccount,onUploadCsv,onUpdateImport,onDeleteImport,onLaunchImports,onDeleteSession,onBack,toast_}){
  const [tab,setTab]=useState("list");
  const [selectedAccount,setSelectedAccount]=useState("all");
  const [filterStatus,setFilterStatus]=useState("pendente");
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [busy,setBusy]=useState(false);

  // Detecta duplicatas dinamicamente
  const importsWithDup=useMemo(()=>{
    return imports.map(imp=>{
      if(imp.status!=="pendente")return imp;
      const dup=findDuplicateExpense(imp,expenses);
      if(dup)return {...imp,_duplicate:dup};
      return imp;
    });
  },[imports,expenses]);

  // Aplica filtros
  const filtered=importsWithDup.filter(imp=>{
    if(selectedAccount!=="all"&&imp.accountId!==selectedAccount)return false;
    if(filterStatus==="all")return true;
    if(filterStatus==="duplicada")return !!imp._duplicate;
    return imp.status===filterStatus;
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  // Estatísticas
  const stats={
    total:importsWithDup.length,
    pendente:importsWithDup.filter(i=>i.status==="pendente").length,
    lancada:importsWithDup.filter(i=>i.status==="lancada").length,
    ignorada:importsWithDup.filter(i=>i.status==="ignorada").length,
    duplicada:importsWithDup.filter(i=>!!i._duplicate).length
  };

  const accountById=Object.fromEntries(accounts.map(a=>[a.id,a]));
  const allFilteredIds=filtered.map(i=>i.id);
  const allSelected=allFilteredIds.length>0&&allFilteredIds.every(id=>selectedIds.has(id));

  const toggleSelect=(id)=>{
    const ns=new Set(selectedIds);
    if(ns.has(id))ns.delete(id);else ns.add(id);
    setSelectedIds(ns);
  };
  const toggleAll=()=>{
    if(allSelected)setSelectedIds(new Set());
    else setSelectedIds(new Set(allFilteredIds));
  };

  // ─── AÇÕES ───────────────────────────────────────────
  const launchOne=async(imp)=>{
    if(!imp.category){toast_("Defina uma categoria primeiro","err");return;}
    if(imp._duplicate){if(!confirm("Esta transação parece duplicar um gasto existente. Lançar mesmo assim?"))return;}
    setBusy(true);
    await onLaunchImports([imp.id]);
    setBusy(false);
    setSelectedIds(new Set([...selectedIds].filter(id=>id!==imp.id)));
  };
  const launchSelected=async()=>{
    const ids=[...selectedIds];
    if(ids.length===0){toast_("Selecione pelo menos uma","err");return;}
    const items=ids.map(id=>importsWithDup.find(i=>i.id===id)).filter(Boolean);
    const semCat=items.filter(i=>!i.category);
    if(semCat.length>0){toast_(`${semCat.length} sem categoria — preencha primeiro`,"err");return;}
    if(!confirm(`Lançar ${ids.length} despesa(s)?`))return;
    setBusy(true);
    await onLaunchImports(ids);
    setBusy(false);
    setSelectedIds(new Set());
  };
  const launchAllPending=async()=>{
    const ids=filtered.filter(i=>i.status==="pendente"&&!i._duplicate).map(i=>i.id);
    if(ids.length===0){toast_("Nenhuma pendente sem duplicata","err");return;}
    const semCat=ids.filter(id=>{const i=importsWithDup.find(x=>x.id===id);return !i.category;});
    if(semCat.length>0){toast_(`${semCat.length} sem categoria — preencha primeiro`,"err");return;}
    if(!confirm(`Lançar TODAS as ${ids.length} pendentes (excluindo duplicatas)?`))return;
    setBusy(true);
    await onLaunchImports(ids);
    setBusy(false);
  };

  const setStatus=async(id,status)=>{
    await onUpdateImport(id,{status});
  };
  const setCategoryFor=async(id,category)=>{
    await onUpdateImport(id,{category});
  };

function ImportSessionsList({imports,accounts,expenses,onDeleteSession,toast_}){
  // Agrupa imports por sessionId
  const sessions=useMemo(()=>{
    const groups={};
    for(const imp of imports){
      const sid=imp.sessionId;
      if(!sid)continue;
      if(!groups[sid])groups[sid]={
        id:sid,
        accountId:imp.accountId,
        items:[],
        firstCreated:imp.createdAt
      };
      groups[sid].items.push(imp);
      if(imp.createdAt&&imp.createdAt<groups[sid].firstCreated)groups[sid].firstCreated=imp.createdAt;
    }
    return Object.values(groups).sort((a,b)=>(b.firstCreated||"").localeCompare(a.firstCreated||""));
  },[imports]);
  
  // Imports antigos sem sessionId
  const orphans=imports.filter(i=>!i.sessionId).length;
  
  const accountById=Object.fromEntries(accounts.map(a=>[a.id,a]));
  
  const handleDelete=async(session,alsoDeleteExpenses)=>{
    const acc=accountById[session.accountId];
    const accName=acc?acc.name:"?";
    const total=session.items.length;
    const lancadas=session.items.filter(i=>i.status==="lancada"||i.status==="vinculada").length;
    const pendentes=session.items.filter(i=>i.status==="pendente").length;
    const ignoradas=session.items.filter(i=>i.status==="ignorada").length;
    
    let msg=`Apagar essa importação?\n\n📅 ${new Date(session.firstCreated).toLocaleString("pt-BR")}\n💳 ${accName}\n\nIsso vai apagar:\n• ${total} lançamento(s) bancário(s)`;
    if(alsoDeleteExpenses&&lancadas>0){
      msg+=`\n• ${lancadas} despesa(s) já lançada(s) (também serão apagadas)`;
    }else if(lancadas>0){
      msg+=`\n\n⚠️ ${lancadas} despesa(s) já lançada(s) NÃO serão apagadas (só desvinculadas).`;
    }
    msg+=`\n\nDetalhes: ${pendentes} pendentes, ${lancadas} lançadas, ${ignoradas} ignoradas`;
    
    if(!confirm(msg))return;
    await onDeleteSession(session.id,alsoDeleteExpenses);
  };
  
  if(sessions.length===0)return React.createElement(Card,null,
    React.createElement("div",{style:{textAlign:"center",padding:30,color:"#9ca3af"}},
      React.createElement("div",{style:{fontSize:48,marginBottom:8}},"📜"),
      React.createElement("div",{style:{fontWeight:600,marginBottom:4,color:"#6b7280"}},"Nenhuma sessão de importação"),
      React.createElement("div",{style:{fontSize:13}},"Cada vez que você importar um CSV, ele aparece aqui agrupado.")
    ),
    orphans>0&&React.createElement("div",{style:{marginTop:12,padding:12,background:"#fef3c7",borderRadius:10,fontSize:12,color:"#78350f"}},
      `ℹ️ Existem ${orphans} importação(ões) antigas sem sessão. Elas não podem ser apagadas em grupo (só individualmente na aba Lista).`
    )
  );
  
  return React.createElement(React.Fragment,null,
    React.createElement(Card,{title:`📜 Histórico de importações (${sessions.length})`},
      React.createElement("div",{style:{fontSize:12,color:"#6b7280",marginBottom:14,lineHeight:1.5}},
        "Cada vez que você importou um CSV, virou uma sessão. Apague a sessão inteira se importou na conta errada ou quer refazer."
      )
    ),
    sessions.map(session=>{
      const acc=accountById[session.accountId];
      const accColor=acc?acc.color:"#94a3b8";
      const total=session.items.length;
      const lancadas=session.items.filter(i=>i.status==="lancada"||i.status==="vinculada").length;
      const pendentes=session.items.filter(i=>i.status==="pendente").length;
      const ignoradas=session.items.filter(i=>i.status==="ignorada").length;
      const date=new Date(session.firstCreated);
      const dateStr=date.toLocaleString("pt-BR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
      
      // Calcula total em R$ (só pendentes + lançadas, ignora ignoradas)
      const valorTotal=session.items.filter(i=>i.status!=="ignorada").reduce((s,i)=>s+(+i.totalAmount||0),0);
      
      return React.createElement(Card,{key:session.id,style:{padding:0,overflow:"hidden",borderLeft:`4px solid ${accColor}`}},
        React.createElement("div",{style:{padding:14}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
            React.createElement("div",{style:{width:36,height:36,borderRadius:10,background:accColor+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},acc?(acc.type==="card"?"💳":"🏦"):"📄"),
            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("div",{style:{fontWeight:700,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},acc?acc.name:"Conta removida"),
              React.createElement("div",{style:{fontSize:11,color:"#6b7280",marginTop:2}},`${dateStr} · ${total} transações · ${brl(valorTotal)}`)
            )
          ),
          React.createElement("div",{style:{display:"flex",gap:8,fontSize:11,marginBottom:12}},
            pendentes>0&&React.createElement("span",{style:{padding:"3px 8px",borderRadius:8,background:"#dbeafe",color:"#1e40af",fontWeight:700}},`⏳ ${pendentes} pendentes`),
            lancadas>0&&React.createElement("span",{style:{padding:"3px 8px",borderRadius:8,background:"#dcfce7",color:"#166534",fontWeight:700}},`✅ ${lancadas} lançadas`),
            ignoradas>0&&React.createElement("span",{style:{padding:"3px 8px",borderRadius:8,background:"#f3f4f6",color:"#6b7280",fontWeight:700}},`🔇 ${ignoradas} ignoradas`)
          ),
          React.createElement("div",{style:{display:"flex",gap:8}},
            lancadas>0?React.createElement(React.Fragment,null,
              React.createElement("button",{onClick:()=>handleDelete(session,false),style:{flex:1,padding:10,borderRadius:10,background:"#fef3c7",color:"#92400e",border:"none",fontWeight:700,fontSize:12}},"🗑️ Apagar só lançamentos bancários"),
              React.createElement("button",{onClick:()=>handleDelete(session,true),style:{flex:1,padding:10,borderRadius:10,background:"#fecaca",color:"#991b1b",border:"none",fontWeight:700,fontSize:12}},`💥 Apagar tudo (+${lancadas} despesas)`)
            ):React.createElement("button",{onClick:()=>handleDelete(session,false),style:{flex:1,padding:10,borderRadius:10,background:"#fecaca",color:"#991b1b",border:"none",fontWeight:700,fontSize:12}},`🗑️ Apagar essa importação`)
          )
        )
      );
    })
  );
}

// ─── UPLOAD CSV SECTION ─────────────────────────────────────
function UploadCsvSection({accounts,onUploadCsv,toast_,payers}){
  const [accountId,setAccountId]=useState(accounts[0]?.id||"");
  const [busy,setBusy]=useState(false);
  const [preview,setPreview]=useState(null);
  const fileRef=useRef();

  useEffect(()=>{if(!accountId&&accounts.length>0)setAccountId(accounts[0].id);},[accounts]);

  const handleFile=async(file)=>{
    if(!file)return;
    if(!accountId){toast_("Selecione uma conta","err");return;}
    setBusy(true);
    setPreview(null);
    try{
      // Tenta UTF-8 primeiro; se falhar, usa ISO-8859-1 (Bradesco)
      const buffer=await file.arrayBuffer();
      let text;
      try{text=new TextDecoder("utf-8",{fatal:true}).decode(buffer);}
      catch{text=new TextDecoder("iso-8859-1").decode(buffer);}
      
      const format=detectCSVFormat(text);
      if(!format){toast_("Formato não reconhecido. Use CSV do Nubank ou Bradesco.","err");setBusy(false);return;}
      
      let items;

function UploadProcessor({uploads,payers,lmap,cats,apiKey,scriptUrl,onSave,onDeleteUpload,onFinish,toast_}){
  const [idx,setIdx]=useState(0);const [stage,setStage]=useState("loading");
  const [b64,setB64]=useState(null);const [mimeType,setMimeType]=useState("image/jpeg");
  const [imageUrl,setImageUrl]=useState(null);const [pdfFilename,setPdfFilename]=useState(null);
  const [result,setResult]=useState({merchant:"",total:"",date:today(),category:"Outros",items:[]});
  const [payer,setPayer]=useState(payers[0]||"Eu");const [splitWith,setSplitWith]=useState([...payers]);
  const [fromCache,setFromCache]=useState(false);
  // Cache persistente entre renders: id do arquivo → análise da IA
  // Evita REPROCESSAR arquivos com Claude se você voltar para a tela
  const analysisCache=useRef({});
  const fileCache=useRef({}); // id → {b64, mimeType, name}
  
  useEffect(()=>{if(idx>=uploads.length){onFinish();return;}processCurrentFile();},[idx]);
  
  const processCurrentFile=async()=>{
    setStage("loading");setResult({merchant:"",total:"",date:today(),category:"Outros",items:[]});
    setPayer(payers[0]||"Eu");setSplitWith([...payers]);setImageUrl(null);setPdfFilename(null);setFromCache(false);
    
    const fileId=uploads[idx].id;
    
    try{
      // 1. CACHE DE ARQUIVO: já baixou esse antes? não baixa de novo
      let fileData=fileCache.current[fileId];
      if(!fileData){
        const r=await api(scriptUrl,"getUploadFile",{id:fileId});
        if(!r.ok)throw new Error(r.error||"Falha");
        const isPdf=r.mimeType==="application/pdf";
        let finalB64=r.base64,finalMime=r.mimeType;
        if(!isPdf){finalB64=await recompressBase64(r.base64,r.mimeType);finalMime="image/jpeg";}
        fileData={b64:finalB64,mimeType:finalMime,name:r.name||uploads[idx].name,isPdf};
        fileCache.current[fileId]=fileData;
      }
      
      if(fileData.isPdf)setPdfFilename(fileData.name);
      else setImageUrl("data:image/jpeg;base64,"+fileData.b64);
      setB64(fileData.b64);setMimeType(fileData.mimeType);
      
      // 2. CACHE DE ANÁLISE: já analisou esse com Claude antes? usa o cache
      let claude=analysisCache.current[fileId];
      if(claude){
        setFromCache(true);
        setResult({merchant:claude.merchant||"",total:claude.total!=null?String(claude.total):"",date:claude.date||today(),category:cats.find(c=>c.n===claude.category)?.n||cats[0]?.n||"Outros",items:claude.items||[]});
        setStage("review");
        return;
      }
      
      // Não tem cache → chama Claude (com retry em rate limit)
      setStage("analyzing");
      try{
        let attempts=0;
        while(attempts<3){
          try{
            claude=await callClaude(fileData.b64,fileData.mimeType,lmap,cats,apiKey);
            break;
          }catch(err){
            if(err.message.includes("429")||err.message.includes("rate_limit")){
              attempts++;
              const waitSecs=attempts===1?10:attempts===2?20:30;
              await sleepWithCountdown(waitSecs,toast_,"⏳ Limite da API. Aguardando");
            }else{throw err;}
          }
        }
        if(claude){
          // Guarda no cache pra não chamar IA de novo
          analysisCache.current[fileId]=claude;
          setResult({merchant:claude.merchant||"",total:claude.total!=null?String(claude.total):"",date:claude.date||today(),category:cats.find(c=>c.n===claude.category)?.n||cats[0]?.n||"Outros",items:claude.items||[]});
        }else{
          toast_("⚠️ IA falhou após 3 tentativas. Preencha manualmente.","err");
        }
      }catch(err){toast_("⚠️ IA falhou: "+err.message,"err");}
      setStage("review");
    }catch(err){toast_("⚠️ "+err.message,"err");setIdx(idx+1);}
  };
  
  const handleSave=async()=>{
    const v=parseFloat((result.total||"0").replace(",","."));
    if(!v){toast_("Informe o valor","err");return;}
    if(splitWith.length===0){toast_("Selecione quem divide","err");return;}
    setStage("saving");
    
    const fileId=uploads[idx].id;
    
    // SAVE: tenta salvar a despesa
    try{
      await onSave({...result,total:v,payer,splitWith,imageBase64:b64,mimeType});
    }catch(err){
      toast_("⚠️ Falha ao salvar: "+err.message,"err");
      // Não apaga do Drive se save falhou — você pode tentar de novo
      setStage("review");
      return;
    }
    
    // DELETE: tenta apagar do Drive (mesmo se save deu certo, é independente)
    // Se delete falhar, NÃO impede de prosseguir — apaga manualmente depois
    try{
      await onDeleteUpload(fileId);
      // Limpa caches deste arquivo (já foi processado)
      delete analysisCache.current[fileId];
      delete fileCache.current[fileId];
    }catch(err){
      toast_("⚠️ Salvou, mas falhou ao apagar do Drive (apague manualmente)","err");
    }
    
    if(idx+1<uploads.length){
      const waitSecs=mimeType==="application/pdf"?8:4;
      await sleepWithCountdown(waitSecs,toast_,"⏳ Próximo em");
    }
    setIdx(idx+1);
  };
  
  const handleSkip=()=>{if(!confirm("Pular este? (volta para a fila depois)"))return;setIdx(idx+1);};
  const handleDiscard=async()=>{
    if(!confirm("Descartar este arquivo? (apaga do Drive sem registrar)"))return;
    const fileId=uploads[idx].id;
    setStage("loading");
    try{
      await onDeleteUpload(fileId);
      delete analysisCache.current[fileId];
      delete fileCache.current[fileId];
    }catch{toast_("⚠️ Falha ao apagar","err");}
    setIdx(idx+1);
  };
  const subtitle=`${idx+1} de ${uploads.length}${fromCache?" · ⚡ cache":""}`;
  if(stage==="loading")return React.createElement(Wrap,{pb:20},React.createElement(Header,{title:"Carregando...",subtitle,onBack:onFinish}),React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:20}},React.createElement(Spinner,{size:48,color:"#2d5a3d"})));
  if(stage==="analyzing")return React.createElement(Wrap,{pb:20},React.createElement(Header,{title:"Analisando...",subtitle,onBack:onFinish}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:24}},
      imageUrl&&React.createElement("img",{src:imageUrl,style:{width:130,height:130,objectFit:"cover",borderRadius:16}}),
      pdfFilename&&React.createElement("div",{style:{fontSize:64}},"📄"),
      React.createElement(Spinner,{size:48,color:"#2d5a3d"})
    )
  );
  if(stage==="saving")return React.createElement(Wrap,{pb:20},React.createElement(Header,{title:"Salvando...",subtitle}),React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:20}},React.createElement(Spinner,{size:48,color:"#2d5a3d"})));
  const skipBtn=React.createElement("button",{onClick:handleSkip,style:{padding:16,borderRadius:16,border:"2px solid #e5e7eb",background:"#fff",color:"#6b7280",fontSize:14,fontWeight:600}},"⏭");
  const discardBtn=React.createElement("button",{onClick:handleDiscard,style:{padding:16,borderRadius:16,border:"2px solid #fecaca",background:"#fff",color:"#dc2626",fontSize:14,fontWeight:600}},"🗑️");
  return React.createElement(Wrap,{pb:20},React.createElement(Header,{title:"Revisar comprovante",subtitle,onBack:onFinish}),
    React.createElement(ReviewForm,{imageUrl,pdfFilename,result,setResult,payer,setPayer,splitWith,setSplitWith,payers,cats,onSave:handleSave,saveLabel:idx+1<uploads.length?"💾 Próximo →":"💾 Finalizar",extraButton:React.createElement(React.Fragment,null,discardBtn,skipBtn)})
  );
}

// ─── LOCAL FILE PROCESSOR ─────────────────────────────────
// Processa arquivos selecionados diretamente do computador (sem Drive)
function LocalFileProcessor({files,payers,lmap,cats,apiKey,imports,accounts,matchPenalties,onSave,onSaveLinked,onFinish,toast_}){
  const [idx,setIdx]=useState(0);
  const [stage,setStage]=useState("loading");
  const [b64,setB64]=useState(null);
  const [mimeType,setMimeType]=useState("image/jpeg");
  const [imageUrl,setImageUrl]=useState(null);
  const [pdfFilename,setPdfFilename]=useState(null);
  const [result,setResult]=useState({merchant:"",total:"",date:today(),category:"Outros",items:[]});
  const [payer,setPayer]=useState(payers[0]||"Eu");
  const [splitWith,setSplitWith]=useState([...payers]);
  const [matches,setMatches]=useState([]);
  const [fromCache,setFromCache]=useState(false);
  // Cache: índice → análise da IA (para não reprocessar se voltar)
  const analysisCache=useRef({});

  useEffect(()=>{
    if(idx>=files.length){onFinish();return;}
    processCurrentFile();
  },[idx]);

  const processCurrentFile=async()=>{
    setStage("loading");
    setResult({merchant:"",total:"",date:today(),category:"Outros",items:[]});
    setPayer(payers[0]||"Eu");setSplitWith([...payers]);
    setImageUrl(null);setPdfFilename(null);setMatches([]);setFromCache(false);

    const file=files[idx];
    // Chave única para o arquivo (mesmo nome+tamanho = mesmo arquivo)
    const fileKey=`${file.name}_${file.size}_${file.lastModified}`;
    
    try{
      const isPdf=file.type==="application/pdf";
      let finalB64,finalMime;

      if(!isPdf){
        finalB64=await compress(file);
        finalMime="image/jpeg";
        setImageUrl("data:image/jpeg;base64,"+finalB64);
      }else{
        const buf=await file.arrayBuffer();
        const bytes=new Uint8Array(buf);
        let bin="";for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
        finalB64=btoa(bin);
        finalMime="application/pdf";
        setPdfFilename(file.name);
      }

      setB64(finalB64);setMimeType(finalMime);
      
      // CACHE: já analisou esse arquivo?
      let claude=analysisCache.current[fileKey];
      if(claude){
        setFromCache(true);
        const res={
          merchant:claude.merchant||"",
          total:claude.total!=null?String(claude.total):"",
          date:claude.date||today(),
          category:cats.find(c=>c.n===claude.category)?.n||cats[0]?.n||"Outros",
          items:claude.items||[]
        };
        setResult(res);
        const v=parseFloat((res.total||"0").replace(",","."));
        if(v&&res.date){
          const tempExp={merchant:res.merchant,total:v,date:res.date};
          const found=findImportMatches(tempExp,imports||[],50,matchPenalties);
          setMatches(found);
        }
        setStage("review");
        return;
      }
      
      setStage("analyzing");

      // Chama Claude com retry
      let attempts=0;
      while(attempts<3){
        try{claude=await callClaude(finalB64,finalMime,lmap,cats,apiKey);break;}
        catch(err){
          if(err.message.includes("429")||err.message.includes("rate_limit")){
            attempts++;
            const waitSecs=attempts===1?10:attempts===2?20:30;
            await sleepWithCountdown(waitSecs,toast_,"⏳ Limite da API. Aguardando");
          }else{throw err;}
        }
      }

      if(claude){
        // Guarda no cache para não chamar IA de novo se voltar
        analysisCache.current[fileKey]=claude;
        const res={
          merchant:claude.merchant||"",
          total:claude.total!=null?String(claude.total):"",
          date:claude.date||today(),
          category:cats.find(c=>c.n===claude.category)?.n||cats[0]?.n||"Outros",
          items:claude.items||[]
        };
        setResult(res);
        // Busca matches bancários (com penalties pra aprender de erros passados)
        const v=parseFloat((res.total||"0").replace(",","."));
        if(v&&res.date){
          const tempExp={merchant:res.merchant,total:v,date:res.date};
          const found=findImportMatches(tempExp,imports||[],50,matchPenalties);
          setMatches(found);
        }
      }else{
        toast_("⚠️ IA falhou. Preencha manualmente.","err");
      }
      setStage("review");
    }catch(err){
      toast_("⚠️ Erro: "+err.message,"err");
      setIdx(idx+1);
    }
  };

  const handleSave=async()=>{
    const v=parseFloat((result.total||"0").replace(",","."));
    if(!v){toast_("Informe o valor","err");return;}
    if(splitWith.length===0){toast_("Selecione quem divide","err");return;}
    setStage("saving");
    
    const file=files[idx];
    const fileKey=`${file.name}_${file.size}_${file.lastModified}`;
    
    try{
      // Auto-link com o melhor match se houver
      if(matches.length>0){
        const bestImp=matches[0].imp;
        const acc=accounts?.find(a=>a.id===bestImp.accountId);
        await onSaveLinked({...result,total:v,payer,splitWith,imageBase64:b64,mimeType,account:acc?.name||"",importId:bestImp.id},bestImp.id);
      }else{
        await onSave({...result,total:v,payer,splitWith,imageBase64:b64,mimeType});
      }
      // Salvou com sucesso → limpa cache deste arquivo
      delete analysisCache.current[fileKey];
    }catch(err){
      toast_("⚠️ Falha ao salvar: "+err.message,"err");
      setStage("review");
      return;
    }
    
    if(idx+1<files.length){
      const waitSecs=mimeType==="application/pdf"?8:4;
      await sleepWithCountdown(waitSecs,toast_,"⏳ Próximo em");
    }
    setIdx(idx+1);
  };

  const handleLinkMatch=async(imp)=>{
    const v=parseFloat((result.total||"0").replace(",","."));
    if(!v){toast_("Informe o valor","err");return;}
    setStage("saving");
    const acc=accounts?.find(a=>a.id===imp.accountId);
    await onSaveLinked({...result,total:v,payer,splitWith,imageBase64:b64,mimeType,account:acc?.name||"",importId:imp.id},imp.id);
    if(idx+1<files.length){
      const waitSecs=mimeType==="application/pdf"?8:4;
      await sleepWithCountdown(waitSecs,toast_,"⏳ Próximo em");
    }
    setIdx(idx+1);
  };

  const handleSkip=()=>{if(!confirm("Pular este arquivo?"))return;setIdx(idx+1);};

  const subtitle=`${idx+1} de ${files.length}${fromCache?" · ⚡ cache":""} · ${files[idx]?.name?.slice(0,25)||""}`;

  if(stage==="loading")return React.createElement(Wrap,{pb:20},
    React.createElement(Header,{title:"Carregando...",subtitle,onBack:onFinish}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:20}},
      React.createElement(Spinner,{size:48,color:"#2d5a3d"}),
      React.createElement("div",{style:{fontWeight:600,color:"#374151",fontSize:14,textAlign:"center"}},"Lendo arquivo...")
    )
  );

  if(stage==="analyzing")return React.createElement(Wrap,{pb:20},
    React.createElement(Header,{title:"Analisando...",subtitle,onBack:onFinish}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:24}},
      imageUrl&&React.createElement("img",{src:imageUrl,style:{width:160,height:160,objectFit:"cover",borderRadius:16}}),
      pdfFilename&&React.createElement("div",{style:{fontSize:72}},"📄"),
      React.createElement(Spinner,{size:48,color:"#2d5a3d"}),
      React.createElement("div",{style:{fontWeight:600,color:"#374151",fontSize:14,textAlign:"center"}},"Claude está analisando..."),
      React.createElement("div",{style:{fontSize:12,color:"#9ca3af"}},files[idx]?.name||"")
    )
  );

  if(stage==="saving")return React.createElement(Wrap,{pb:20},
    React.createElement(Header,{title:"Salvando...",subtitle}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:20}},
      React.createElement(Spinner,{size:48,color:"#2d5a3d"}),
      React.createElement("div",{style:{fontWeight:600,color:"#374151",fontSize:14}},"Salvando...")
    )
  );

  // Botões de ação extras
  const skipBtn=React.createElement("button",{onClick:handleSkip,style:{padding:16,borderRadius:16,border:"2px solid #e5e7eb",background:"#fff",color:"#6b7280",fontSize:14,fontWeight:600,whiteSpace:"nowrap"}},"⏭");

  return React.createElement(Wrap,{pb:20},
    React.createElement(Header,{title:"Revisar comprovante",subtitle,onBack:onFinish}),
    React.createElement("div",{style:{padding:16}},
      // Banner: vai vincular automaticamente
      matches.length>0&&React.createElement("div",{style:{padding:12,background:"#f0fdf4",border:"1.5px solid #16a34a",borderRadius:12,marginBottom:14}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
          React.createElement("span",{style:{fontSize:18}},"🔗"),
          React.createElement("div",{style:{fontWeight:700,fontSize:13,color:"#166534"}},"Será vinculado automaticamente:")
        ),
        (()=>{const imp=matches[0].imp;const acc=accounts?.find(a=>a.id===imp.accountId);return React.createElement("div",{style:{fontSize:12,color:"#166534",paddingLeft:26}},
          React.createElement("div",{style:{fontWeight:600}},imp.title),
          React.createElement("div",{style:{fontSize:11,opacity:.85}},`${dtBR(imp.date)} · ${acc?.name||"?"} · ${brl(imp.totalAmount)} · score ${matches[0].score}%`)
        );})(),
        React.createElement("div",{style:{fontSize:11,color:"#9ca3af",marginTop:6,paddingLeft:26}},"Você pode editar depois no histórico se errar.")
      ),
      React.createElement(ReviewForm,{
        imageUrl,pdfFilename,result,setResult,payer,setPayer,
        splitWith,setSplitWith,payers,cats,
        onSave:handleSave,
        saveLabel:idx+1<files.length?"💾 Salvar e próximo →":"💾 Salvar e finalizar",
        extraButton:skipBtn
      })
    )
  );
}


// ─── BULK UPLOAD PROCESSOR ─────────────────────────────────
// Processa TODOS os arquivos da pasta Drive automaticamente, sem revisão por arquivo.
// Cada despesa é lançada com flag reviewed=false, mostrando ícone ! no histórico.
function BulkUploadProcessor({uploads,expensesAll,payers,lmap,cats,apiKey,scriptUrl,imports,accounts,matchPenalties,onSaveBulk,onDeleteUpload,onMoveToErrors,onFinish,toast_}){
  const [idx,setIdx]=useState(0);
  const [stage,setStage]=useState("config"); // começa na tela de configuração
  const [defaultPayer,setDefaultPayer]=useState(payers[0]||"");
  const [currentFile,setCurrentFile]=useState(null);
  const [stats,setStats]=useState({success:0,linked:0,failed:0,skipped:0});
  const [log,setLog]=useState([]);
  const cancelRef=useRef(false);
  
  const addLog=(msg,type="ok")=>{
    setLog(p=>[{msg,type,at:Date.now()},...p].slice(0,8));
  };
  
  const startProcessing=()=>{
    if(!defaultPayer){toast_("Escolha o pagador padrão","err");return;}
    cancelRef.current=false;
    setStage("processing");
  };
  
  useEffect(()=>{
    if(stage==="processing"){
      processAll();
    }
    return()=>{cancelRef.current=true;};
  },[stage]);
  
  const processAll=async()=>{
    setStage("processing");
    let successCount=0,linkedCount=0,failedCount=0,skippedCount=0;
    let consecutiveFailures=0;
    
    // Mecanismo 1: deduplicação por DriveFileID
    // Coleta IDs de arquivos já processados antes
    const usedFileIds=new Set();
    (expensesAll||[]).forEach(e=>{if(e.driveFileId)usedFileIds.add(e.driveFileId);});
    
    for(let i=0;i<uploads.length;i++){
      if(cancelRef.current)break;
      
      // Se falhou 3x seguidas, problema sistêmico — para tudo
      if(consecutiveFailures>=3){
        addLog(`⛔ ${consecutiveFailures} falhas seguidas — interrompendo. Verifique o Drive ou Apps Script.`,"err");
        break;
      }
      
      const upload=uploads[i];
      setIdx(i);
      setCurrentFile(upload);
      
      // Mecanismo 1: pula se já processou
      if(usedFileIds.has(upload.id)){
        skippedCount++;
        addLog(`⏭ ${i+1}. ${upload.name?.slice(0,30)||"?"}: já processado antes`,"warn");
        // Apaga do Drive (já está no Sheets)
        try{await onDeleteUpload(upload.id);}catch{}
        continue;
      }
      
      try{
        // 1. Baixa arquivo do Drive
        const r=await api(scriptUrl,"getUploadFile",{id:upload.id});
        if(!r.ok)throw new Error(r.error||"Falha ao baixar");
        
        const isPdf=r.mimeType==="application/pdf";
        let finalB64=r.base64,finalMime=r.mimeType;
        if(!isPdf){finalB64=await recompressBase64(r.base64,r.mimeType);finalMime="image/jpeg";}
        
        // 2. Chama Claude com retry
        let claude=null,attempts=0;
        while(attempts<3&&!cancelRef.current){
          try{claude=await callClaude(finalB64,finalMime,lmap,cats,apiKey);break;}
          catch(err){
            if(err.message.includes("429")||err.message.includes("rate_limit")){
              attempts++;
              const waitSecs=attempts===1?15:attempts===2?30:60;
              addLog(`⏳ Rate limit no ${i+1}, aguardando ${waitSecs}s...`,"warn");
              await new Promise(res=>setTimeout(res,waitSecs*1000));
            }else{throw err;}
          }
        }
        
        if(!claude)throw new Error("IA falhou após 3 tentativas");
        
        // 3. Monta despesa com defaults seguros
        const v=Number(claude.total)||0;
        if(v<=0)throw new Error("Valor inválido na análise");
        
        const merchant=claude.merchant||upload.name||"Sem nome";
        const date=claude.date||today();
        const category=cats.find(c=>c.n===claude.category)?.n||cats[0]?.n||"Outros";
        const items=claude.items||[];
        
        // 4. Tenta achar match bancário
        let importId="",accountName="",payer=defaultPayer||payers[0]||"";
        const tempExp={merchant,total:v,date};
        const matches=findImportMatches(tempExp,imports||[],50,matchPenalties);
        if(matches.length>0){
          const bestImp=matches[0].imp;
          const acc=accounts?.find(a=>a.id===bestImp.accountId);
          importId=bestImp.id;
          // Conta vinculada tem prioridade sobre o pagador padrão
          if(acc){accountName=acc.name;payer=acc.payer||payer;}
        }
        
        // 5. Salva despesa (reviewed=false)
        const expense={
          merchant,date,category,total:v,items,
          payer,
          splitWith:[payer], // padrão: só pagador
          imageBase64:finalB64,
          mimeType:finalMime,
          account:accountName,
          importId,
          reviewed:false,
          driveFileId:upload.id // Mecanismo 1: dedup
        };
        
        const saved=await onSaveBulk(expense,importId);
        if(!saved)throw new Error("Falha ao salvar");
        
        successCount++;
        consecutiveFailures=0; // reset porque deu certo
        if(importId)linkedCount++;
        const linkTag=importId?" 🔗":"";
        addLog(`✅ ${i+1}. ${merchant.slice(0,25)} · ${brl(v)}${linkTag}`);
        setStats({success:successCount,linked:linkedCount,failed:failedCount,skipped:skippedCount});
        
        // 6. Apaga do Drive
        try{await onDeleteUpload(upload.id);}catch{}
        
        // 7. Pausa antes do próximo
        if(i+1<uploads.length&&!cancelRef.current){
          const waitSecs=isPdf?8:4;
          await new Promise(res=>setTimeout(res,waitSecs*1000));
        }
      }catch(err){
        failedCount++;
        consecutiveFailures++;
        const msg=err.message||"erro desconhecido";
        addLog(`❌ ${i+1}. ${upload.name?.slice(0,25)||"?"}: ${msg.slice(0,40)}`,"err");
        setStats({success:successCount,linked:linkedCount,failed:failedCount,skipped:skippedCount});
        
        // Mecanismo 2: se é erro do Drive (DRM, formato, etc), move pra pasta erros/
        // Detecta por keywords típicos
        const isDriveError=msg.toLowerCase().includes("drive")||msg.toLowerCase().includes("formato")||msg.toLowerCase().includes("grande demais")||msg.toLowerCase().includes("não foi possível ler");
        if(isDriveError&&onMoveToErrors){
          try{
            await onMoveToErrors(upload.id);
            addLog(`📁 Movido para pasta upload/erros/ — não tentará de novo`,"warn");
          }catch{}
        }
        
        // Backoff progressivo: 5s, 15s, 30s entre falhas seguidas
        if(i+1<uploads.length&&!cancelRef.current){
          const backoff=consecutiveFailures===1?5:consecutiveFailures===2?15:30;
          addLog(`⏸️ Aguardando ${backoff}s antes de tentar o próximo...`,"warn");
          await new Promise(res=>setTimeout(res,backoff*1000));
        }
      }
    }
    
    setStage("done");
  };
  
  const handleCancel=()=>{
    if(!confirm("Cancelar processamento? O que já foi processado não se perde."))return;
    cancelRef.current=true;
    setStage("done");
  };
  
  if(stage==="config")return React.createElement(Wrap,{pb:30},
    React.createElement(Header,{title:"Processamento em massa",subtitle:`${uploads.length} arquivo${uploads.length!==1?"s":""}`,onBack:onFinish}),
    React.createElement("div",{style:{padding:16}},
      React.createElement(Card,{title:"👤 Quem são os comprovantes?"},
        React.createElement("div",{style:{fontSize:13,color:"#6b7280",marginBottom:14,lineHeight:1.5}},
          "Quando o comprovante não tiver vínculo bancário identificado, quem será o pagador padrão?"
        ),
        React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}},
          payers.map(p=>React.createElement("button",{key:p,onClick:()=>setDefaultPayer(p),style:{padding:"10px 20px",borderRadius:24,border:"2px solid",borderColor:defaultPayer===p?"#1a3a2a":"#e5e7eb",background:defaultPayer===p?"#1a3a2a":"#fff",color:defaultPayer===p?"#fff":"#374151",fontWeight:700,fontSize:14}},p))
        ),
        React.createElement("div",{style:{padding:10,background:"#f0fdf4",borderRadius:10,fontSize:12,color:"#166534"}},
          "💡 Se o comprovante tiver vínculo bancário (ex: Cartão Nubank Gustavo), o dono da conta prevalece automaticamente."
        )
      ),
      React.createElement("button",{onClick:startProcessing,disabled:!defaultPayer,style:{width:"100%",padding:16,borderRadius:16,background:"linear-gradient(135deg,#1a3a2a,#2d5a3d)",color:"#fff",border:"none",fontWeight:700,fontSize:15}},"🚀 Iniciar processamento")
    )
  );
  
  if(stage==="starting")return React.createElement(Wrap,{pb:30},
    React.createElement(Header,{title:"Iniciando..."}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:20}},
      React.createElement(Spinner,{size:48,color:"#2d5a3d"})
    )
  );
  
  if(stage==="done")return React.createElement(Wrap,{pb:30},
    React.createElement(Header,{title:"Processamento concluído"}),
    React.createElement("div",{style:{padding:16}},
      React.createElement(Card,null,
        React.createElement("div",{style:{textAlign:"center",padding:20}},
          React.createElement("div",{style:{fontSize:56,marginBottom:8}},stats.failed===0?"🎉":"✅"),
          React.createElement("div",{style:{fontSize:22,fontWeight:700,marginBottom:4,color:"#1a3a2a"}},stats.success+" lançada"+(stats.success!==1?"s":"")),
          stats.linked>0&&React.createElement("div",{style:{fontSize:13,color:"#16a34a",marginBottom:4}},`🔗 ${stats.linked} vinculada${stats.linked!==1?"s":""} a lançamentos bancários`),
          stats.skipped>0&&React.createElement("div",{style:{fontSize:13,color:"#6b7280",marginBottom:4}},`⏭ ${stats.skipped} já processada${stats.skipped!==1?"s":""} antes (puladas)`),
          stats.failed>0&&React.createElement("div",{style:{fontSize:13,color:"#dc2626"}},`❌ ${stats.failed} falharam (continuam na pasta upload)`)
        )
      ),
      React.createElement("div",{style:{padding:14,background:"#fef3c7",border:"1.5px solid #f59e0b",borderRadius:14,marginBottom:14,fontSize:13,color:"#78350f",lineHeight:1.5}},
        React.createElement("div",{style:{fontWeight:700,marginBottom:6}},"💡 Lembre-se de revisar"),
        React.createElement("div",null,"As despesas têm um pequeno ",React.createElement("span",{style:{display:"inline-flex",width:14,height:14,borderRadius:"50%",background:"#f59e0b",color:"#fff",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,verticalAlign:"middle"}},"!")," indicando que ainda não foram revisadas. Toque em cada uma no histórico para conferir e ajustar.")
      ),
      log.length>0&&React.createElement(Card,{title:"Resumo"},
        React.createElement("div",{style:{maxHeight:300,overflowY:"auto"}},
          log.map((entry,i)=>React.createElement("div",{key:i,style:{padding:"6px 0",fontSize:12,borderBottom:i<log.length-1?"1px solid #f0ede6":"none",color:entry.type==="err"?"#dc2626":entry.type==="warn"?"#92400e":"#374151"}},entry.msg))
        )
      ),
      React.createElement("button",{onClick:onFinish,style:{width:"100%",padding:14,borderRadius:14,background:"linear-gradient(135deg,#1a3a2a,#2d5a3d)",color:"#fff",border:"none",fontWeight:700,fontSize:14,marginTop:14}},"Ver histórico")
    )
  );
  
  // stage = "processing"
  const pct=uploads.length>0?Math.round((idx/uploads.length)*100):0;
  return React.createElement(Wrap,{pb:30},
    React.createElement(Header,{title:"Processando em massa",subtitle:`${idx+1} de ${uploads.length}`,right:React.createElement("button",{onClick:handleCancel,style:{padding:"6px 12px",borderRadius:10,background:"rgba(255,255,255,.2)",color:"#fff",border:"none",fontSize:12,fontWeight:600}},"✕ Parar")}),
    React.createElement("div",{style:{padding:16}},
      // Barra de progresso
      React.createElement(Card,null,
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13,fontWeight:700}},
          React.createElement("span",null,`${pct}% concluído`),
          React.createElement("span",{style:{color:"#6b7280"}},`${idx+1}/${uploads.length}`)
        ),
        React.createElement("div",{style:{height:8,background:"#f3f4f6",borderRadius:6,overflow:"hidden"}},
          React.createElement("div",{style:{height:"100%",background:"linear-gradient(90deg,#16a34a,#15803d)",width:`${pct}%`,transition:"width .3s"}})
        ),
        React.createElement("div",{style:{display:"flex",gap:14,marginTop:14,fontSize:11}},
          React.createElement("div",{style:{color:"#16a34a",fontWeight:700}},`✅ ${stats.success}`),
          stats.linked>0&&React.createElement("div",{style:{color:"#16a34a",fontWeight:700}},`🔗 ${stats.linked}`),
          stats.skipped>0&&React.createElement("div",{style:{color:"#6b7280",fontWeight:700}},`⏭ ${stats.skipped}`),
          stats.failed>0&&React.createElement("div",{style:{color:"#dc2626",fontWeight:700}},`❌ ${stats.failed}`)
        )
      ),
      // Arquivo atual
      currentFile&&React.createElement(Card,{title:"📄 Processando agora"},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement(Spinner,{size:24,color:"#2d5a3d"}),
          React.createElement("div",{style:{flex:1,minWidth:0}},

async function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const s=Math.min(1,1200/img.width);
        c.width=img.width*s;c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function api(url,action,params={}){
  if(!url)throw new Error("URL não configurada");
  if(action==="getAll"){
    const r=await fetch(`${url}?action=getAll&t=${Date.now()}`);
    if(!r.ok)throw new Error("Erro "+r.status);
    return r.json();
  }
  const r=await fetch(url,{method:"POST",body:JSON.stringify({action,...params})});
  if(!r.ok)throw new Error("Erro "+r.status);
  return r.json();
}

async function callClaude(b64,lmap,cats,apiKey){
  if(!apiKey)throw new Error("Chave API não configurada");
  const hints=Object.entries(lmap).map(([m,c])=>`"${m}"→${c}`).join("; ");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:`Analise o comprovante e retorne APENAS JSON:\n{"merchant":"nome","total":0.00,"date":"YYYY-MM-DD","category":"cat","items":[]}\n\nCategorias: ${cats.map(c=>c.n).join(", ")}\n${hints?`\nAprendizado: ${hints}`:""}`}
    ]}]})
  });
  if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e.slice(0,150));}
  const d=await res.json();
  const t=d.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(t.replace(/```\w*\n?|\n?```/g,"").trim());
}

async function suggestEmojis(name,apiKey){
  if(!apiKey)throw new Error("Chave API não configurada");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:100,messages:[{role:"user",content:`Sugira 3 emojis para a categoria "${name}" em app financeiro. Retorne APENAS array JSON: ["X","Y","Z"]`}]})
  });
  if(!res.ok)throw new Error("API "+res.status);
  const d=await res.json();
  const t=d.content?.find(b=>b.type==="text")?.text||"[]";
  return JSON.parse(t.replace(/```\w*\n?|\n?```/g,"").trim());
}

  // Garantir que pagador esteja sempre incluído no rateio

    if(payer&&!splitWith.includes(payer))setSplitWith(p=>[...p,payer]);

  const toggleAll=()=>{
    if(splitWith.length===payers.length)setSplitWith([payer]);
    else setSplitWith([...payers]);
  };
  const togglePerson=(p)=>{
    if(p===payer){toast_("Pagador sempre faz parte","err");return;}
    if(splitWith.includes(p))setSplitWith(splitWith.filter(x=>x!==p));
    else setSplitWith([...splitWith,p]);
  };

  const handleFile=async(file)=>{
    if(!file)return;
    if(!apiKey){toast_("⚠️ Configure a chave da Anthropic em ⚙️","err");return;}
    setPreview(URL.createObjectURL(file));
    setStage("analyzing");
    try{
      const img=await compress(file);
      setB64(img);
      const r=await callClaude(img,lmap,cats,apiKey);
      setResult({merchant:r.merchant||"",total:r.total!=null?String(r.total):"",date:r.date||today(),category:cats.find(c=>c.n===r.category)?.n||cats[0]?.n||"Outros",items:r.items||[]});
      setStage("review");

  };

    if(!v){toast_("Informe o valor","err");return;}
    if(splitWith.length===0){toast_("Selecione pelo menos uma pessoa para o rateio","err");return;}

        React.createElement("span",{style:{fontWeight:600,color:"#374151",fontSize:15}},"Digitar manualmente")
      )
    )
  );

  if(stage==="analyzing")return React.createElement(Wrap,{pb:20},
    React.createElement(Header,{title:"Analisando...",onBack}),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:24}},
      preview&&React.createElement("img",{src:preview,style:{width:130,height:130,objectFit:"cover",borderRadius:16}}),
      React.createElement(Spinner,{size:48,color:"#2d5a3d"}),

            const h=Math.max(4,(b.v/maxBar)*110);
            return React.createElement("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
              React.createElement("div",{style:{fontSize:10,color:"#6b7280",fontWeight:600}},b.v>0?`${(b.v/1000).toFixed(1)}k`:""),
              React.createElement("div",{style:{height:h,width:"100%",background:i===5?"#1a3a2a":"#c6dece",borderRadius:"5px 5px 0 0"}}),
              React.createElement("div",{style:{fontSize:11,color:"#6b7280"}},b.l)
            );
          })
        )
      ),

      // Recent
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        React.createElement("h3",{style:{margin:0,fontSize:15,fontWeight:700}},"Recentes"),
        React.createElement("button",{onClick:()=>setView("history"),style:{background:"none",border:"none",color:"#2d5a3d",fontWeight:600,fontSize:13}},"Ver tudo →")
      ),
      React.createElement(Card,null,
        expenses.length===0&&React.createElement("div",{style:{textAlign:"center",color:"#9ca3af",padding:20,fontSize:14}},"Nenhum gasto registrado ainda"),
        expenses.slice(0,6).map(e=>React.createElement(ExpRow,{key:e.id,e,cats}))
      )
    ),
    React.createElement("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #e5e7eb",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 0 18px",zIndex:100}},
      [{icon:"🏠",label:"Início",v:"home"},{icon:"📋",label:"Histórico",v:"history"},{icon:"⚙️",label:"Config",v:"settings"}].map(b=>
        React.createElement("button",{key:b.v,onClick:()=>setView(b.v),style:{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 20px",color:view===b.v?"#1a3a2a":"#9ca3af"}},
          React.createElement("span",{style:{fontSize:22}},b.icon),
          React.createElement("span",{style:{fontSize:11,fontWeight:600}},b.label)
        )
      )
    ),
    React.createElement("button",{onClick:()=>setView("capture"),style:{position:"fixed",bottom:74,right:16,width:58,height:58,borderRadius:"50%",background:"linear-gradient(135deg,#1a3a2a,#2d5a3d)",color:"#fff",fontSize:30,border:"none",boxShadow:"0 6px 24px rgba(26,58,42,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}},"+")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

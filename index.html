// Período retorna {from,to,label} em strings YYYY-MM-DD
function periodRange(period,now){
  const y=now.getFullYear(),m=now.getMonth();
  if(period==="thisMonth")return {from:ymd(new Date(y,m,1)),to:ymd(new Date(y,m+1,0)),label:now.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})};
  if(period==="lastMonth"){const d=new Date(y,m-1,1);return {from:ymd(d),to:ymd(new Date(y,m,0)),label:d.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})};}
  if(period==="last3"){const d=new Date(y,m-2,1);return {from:ymd(d),to:ymd(new Date(y,m+1,0)),label:"Últimos 3 meses"};}
  if(period==="thisYear")return {from:ymd(new Date(y,0,1)),to:ymd(new Date(y,11,31)),label:y+""};
  if(period==="all")return {from:"1900-01-01",to:"2999-12-31",label:"Todo o período"};
  return {from:ymd(new Date(y,m,1)),to:ymd(new Date(y,m+1,0)),label:"Este mês"};
}

function shiftPeriodPrev(period,now){
  const y=now.getFullYear(),m=now.getMonth();
  if(period==="thisMonth")return {from:ymd(new Date(y,m-1,1)),to:ymd(new Date(y,m,0))};
  if(period==="lastMonth")return {from:ymd(new Date(y,m-2,1)),to:ymd(new Date(y,m-1,0))};
  if(period==="last3")return {from:ymd(new Date(y,m-5,1)),to:ymd(new Date(y,m-2,0))};
  if(period==="thisYear")return {from:ymd(new Date(y-1,0,1)),to:ymd(new Date(y-1,11,31))};
  return null;
}

function inRange(dateStr,from,to){
  if(!dateStr)return false;
  return dateStr>=from && dateStr<=to;
}

async function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const s=Math.min(1,1200/img.width);
        c.width=img.width*s;c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function recompressBase64(base64,mimeType){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      const s=Math.min(1,1200/img.width);
      c.width=img.width*s;c.height=img.height*s;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
    };
    img.onerror=rej;
    img.src="data:"+(mimeType||"image/jpeg")+";base64,"+base64;
  });
}

async function api(url,action,params={}){
  if(!url)throw new Error("URL não configurada");
  if(action==="getAll"||action==="listUploads"||action==="ensureUpload"){
    const qs=new URLSearchParams({action,t:Date.now(),...params}).toString();
    const r=await fetch(`${url}?${qs}`);
    if(!r.ok)throw new Error("Erro "+r.status);
    return r.json();
  }
  const r=await fetch(url,{method:"POST",body:JSON.stringify({action,...params})});
  if(!r.ok)throw new Error("Erro "+r.status);
  return r.json();
}

async function callClaude(b64,mimeType,lmap,cats,apiKey){
  if(!apiKey)throw new Error("Chave API não configurada");
  const hints=Object.entries(lmap).map(([m,c])=>`"${m}"→${c}`).join("; ");
  const isPdf=mimeType==="application/pdf";
  const contentBlock=isPdf
    ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}
    :{type:"image",source:{type:"base64",media_type:mimeType||"image/jpeg",data:b64}};
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[
      contentBlock,
      {type:"text",text:`Analise o comprovante/cupom/nota fiscal e retorne APENAS JSON:\n{"merchant":"nome","total":0.00,"date":"YYYY-MM-DD","category":"cat","items":[]}\n\nCategorias: ${cats.map(c=>c.n).join(", ")}\n${hints?`\nAprendizado: ${hints}`:""}`}
    ]}]})
  });
  if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e.slice(0,150));}
  const d=await res.json();
  const t=d.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(t.replace(/```\w*\n?|\n?```/g,"").trim());
}

async function suggestEmojis(name,apiKey){
  if(!apiKey)throw new Error("Chave API não configurada");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:100,messages:[{role:"user",content:`Sugira 3 emojis para a categoria "${name}". Retorne APENAS array JSON: ["X","Y","Z"]`}]})
  });
  if(!res.ok)throw new Error("API "+res.status);
  const d=await res.json();
  const t=d.content?.find(b=>b.type==="text")?.text||"[]";
  return JSON.parse(t.replace(/```\w*\n?|\n?```/g,"").trim());
}

// ─── DASHBOARD ───────────────────────────────────────────────
function DashboardView({expenses,cats,payers,onBack}){
  const [period,setPeriod]=useState("thisMonth");
  const [tab,setTab]=useState("resumo");
  const [filterPerson,setFilterPerson]=useState("todos");
  const [filterCat,setFilterCat]=useState("Todas");
  const [expandedCat,setExpandedCat]=useState(null);

  const now=new Date();
  const range=periodRange(period,now);
  const prevRange=shiftPeriodPrev(period,now);

  // Filter expenses for current period
  const inPeriod=expenses.filter(e=>inRange(e.date,range.from,range.to));
  
  // Aplicar filtros adicionais
  const filtered=inPeriod.filter(e=>{
    if(filterPerson!=="todos"){
      const split=effectiveSplit(e);
      if(!split.includes(filterPerson)&&e.payer!==filterPerson)return false;
    }
    if(filterCat!=="Todas"&&e.category!==filterCat)return false;
    return true;
  });

  const total=filtered.reduce((s,e)=>s+(+e.total||0),0);
  const txCount=filtered.length;
  const avgPerDay=total/daysBetween(new Date(range.from+"T12:00"),new Date(range.to+"T12:00"));
  
  // Projeção mês: total/dia * dias do mês (só faz sentido para "thisMonth")
  let projection=null;
  if(period==="thisMonth"){
    const daysPassed=Math.max(1,now.getDate());
    const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    projection=(total/daysPassed)*daysInMonth;
  }

  // Maior gasto único
  const biggest=filtered.reduce((m,e)=>(+e.total>(+m?.total||0))?e:m,null);

  // Comparativo vs período anterior
  let prevTotal=0,diffPct=null;
  if(prevRange){
    const prev=expenses.filter(e=>inRange(e.date,prevRange.from,prevRange.to));
    const prevFilt=prev.filter(e=>{
      if(filterPerson!=="todos"){
        const split=effectiveSplit(e);
        if(!split.includes(filterPerson)&&e.payer!==filterPerson)return false;
      }
      if(filterCat!=="Todas"&&e.category!==filterCat)return false;
      return true;
    });
    prevTotal=prevFilt.reduce((s,e)=>s+(+e.total||0),0);
    if(prevTotal>0)diffPct=((total-prevTotal)/prevTotal)*100;
  }

  // Por categoria
  const catSum={};
  filtered.forEach(e=>{catSum[e.category]=(catSum[e.category]||0)+(+e.total||0);});
  const catList=Object.entries(catSum).map(([n,v])=>({n,v:+v.toFixed(2)})).sort((a,b)=>b.v-a.v);

  // Comparativo por categoria vs período anterior
  const catCompare={};
  if(prevRange){
    const prev=expenses.filter(e=>inRange(e.date,prevRange.from,prevRange.to));
    prev.forEach(e=>{catCompare[e.category]=(catCompare[e.category]||0)+(+e.total||0);});
  }

  // Por pessoa: pagou + consumiu
  const perPerson={};
  filtered.forEach(e=>{
    const t=+e.total||0;
    if(e.payer){perPerson[e.payer]=perPerson[e.payer]||{paid:0,consumed:0};perPerson[e.payer].paid+=t;}
    const split=effectiveSplit(e);
    if(split.length>0){
      const share=t/split.length;
      split.forEach(p=>{perPerson[p]=perPerson[p]||{paid:0,consumed:0};perPerson[p].consumed+=share;});
    }
  });
  const perPersonArr=Object.entries(perPerson).map(([name,d])=>({name,paid:d.paid,consumed:d.consumed,balance:d.paid-d.consumed})).sort((a,b)=>b.balance-a.balance);

  // Saldos: simplificar dívidas (algoritmo greedy)
  const debts=[];
  if(perPersonArr.length>1){
    const creds=perPersonArr.filter(p=>p.balance>0.01).map(p=>({...p,bal:p.balance}));
    const dbts=perPersonArr.filter(p=>p.balance<-0.01).map(p=>({...p,bal:-p.balance}));
    creds.sort((a,b)=>b.bal-a.bal);
    dbts.sort((a,b)=>b.bal-a.bal);
    let i=0,j=0;
    while(i<dbts.length&&j<creds.length){
      const amt=Math.min(dbts[i].bal,creds[j].bal);
      if(amt>0.01)debts.push({from:dbts[i].name,to:creds[j].name,amount:amt});
      dbts[i].bal-=amt;creds[j].bal-=amt;
      if(dbts[i].bal<0.01)i++;
      if(creds[j].bal<0.01)j++;
    }
  }

  // Linha dia a dia (do período)
  const dayMap={};
  filtered.forEach(e=>{if(e.date)dayMap[e.date]=(dayMap[e.date]||0)+(+e.total||0);});
  const fromD=new Date(range.from+"T12:00");
  const toD=new Date(range.to+"T12:00");
  const daysArr=[];
  for(let d=new Date(fromD);d<=toD;d.setDate(d.getDate()+1)){
    const k=ymd(d);
    daysArr.push({date:k,v:dayMap[k]||0,day:d.getDate()});
  }
  // Se for "thisYear" ou "all", agrupar por mês
  let timelineData=daysArr;
  let groupBy="day";
  if(daysArr.length>62){
    groupBy="month";
    const monthMap={};
    daysArr.forEach(d=>{
      const mk=d.date.slice(0,7);
      monthMap[mk]=(monthMap[mk]||0)+d.v;
    });
    timelineData=Object.entries(monthMap).map(([k,v])=>({date:k,v,label:new Date(k+"-15").toLocaleDateString("pt-BR",{month:"short"})}));
  }

  // Por semana (no período)
  const weekMap={};
  filtered.forEach(e=>{
    if(!e.date)return;
    const d=new Date(e.date+"T12:00");
    const monday=new Date(d);
    monday.setDate(d.getDate()-((d.getDay()+6)%7));
    const k=ymd(monday);
    weekMap[k]=(weekMap[k]||0)+(+e.total||0);
  });
  const weekArr=Object.entries(weekMap).map(([k,v])=>({k,v,label:`${new Date(k+"T12:00").getDate()}/${new Date(k+"T12:00").getMonth()+1}`})).sort((a,b)=>a.k.localeCompare(b.k));

  // Por dia da semana
  const dowMap=[0,0,0,0,0,0,0];
  const dowCount=[0,0,0,0,0,0,0];
  filtered.forEach(e=>{
    if(!e.date)return;
    const d=new Date(e.date+"T12:00");
    dowMap[d.getDay()]+=(+e.total||0);
    dowCount[d.getDay()]++;
  });
  const dowArr=DOW_LABELS.map((l,i)=>({label:l,v:dowMap[i],count:dowCount[i]}));
  const maxDow=Math.max(...dowMap,1);

  // Top estabelecimentos
  const merchMap={};
  filtered.forEach(e=>{
    const m=e.merchant||"Sem nome";
    merchMap[m]=merchMap[m]||{total:0,count:0};
    merchMap[m].total+=(+e.total||0);
    merchMap[m].count++;
  });
  const topByValue=Object.entries(merchMap).map(([n,d])=>({n,...d})).sort((a,b)=>b.total-a.total).slice(0,10);
  const topByFreq=Object.entries(merchMap).map(([n,d])=>({n,...d})).sort((a,b)=>b.count-a.count).slice(0,10);

  // ─── Renders ─────────────────────────────────────────
  const PieChartSvg=()=>{
    let offset=0;
    const tot=catList.reduce((s,e)=>s+e.v,0)||1;
    const cx=80,cy=80,r=72,ri=40;
    const rad=a=>a*Math.PI/180;
    return React.createElement("svg",{viewBox:"0 0 160 160",width:160,height:160},
      catList.map((e,i)=>{
        const pct=e.v/tot,angle=pct*360;
        const s=rad(offset-90),en=rad(offset+angle-90);
        const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);

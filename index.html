function App(){
  const [view,setView]=useState("home");
  const [localFiles,setLocalFiles]=useState([]);
  const [cfg,setCfg]=useState(()=>ld("cfg",{scriptUrl:""}));
  const [apiKey,setApiKey]=useState(()=>ld("apiKey",""));
  const [expenses,setExpenses]=useState(()=>ld("exp",[]));
  const [lmap,setLmap]=useState(()=>ld("lmap",{}));
  const [payers,setPayers]=useState(()=>ld("payers",["Eu"]));
  const [cats,setCats]=useState(()=>ld("cats",DEFAULT_CATS));
  const [accounts,setAccounts]=useState(()=>ld("accounts",[]));
  const [imports,setImports]=useState(()=>ld("imports",[]));
  const [matchPenalties,setMatchPenalties]=useState(()=>ld("matchPenalties",{}));
  const [editingExpense,setEditingExpense]=useState(null);
  const [pendingUploads,setPendingUploads]=useState([]);
  const [uploadFolderUrl,setUploadFolderUrl]=useState("");
  const [toast,setToast]=useState(null);
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>sv("cfg",cfg),[cfg]);
  useEffect(()=>sv("apiKey",apiKey),[apiKey]);
  useEffect(()=>sv("exp",expenses),[expenses]);
  useEffect(()=>sv("lmap",lmap),[lmap]);
  useEffect(()=>sv("payers",payers),[payers]);
  useEffect(()=>sv("cats",cats),[cats]);
  useEffect(()=>sv("accounts",accounts),[accounts]);
  useEffect(()=>sv("imports",imports),[imports]);
  useEffect(()=>sv("matchPenalties",matchPenalties),[matchPenalties]);

  const toast_=useCallback((msg,type="ok")=>{
    setToast({msg,type});
    // Mensagens de espera ficam só 1.2s para que o próximo countdown sobrescreva
    const dur=typeof msg==="string"&&msg.includes("⏳")?1200:3500;
    setTimeout(()=>setToast(null),dur);
  },[]);

  const checkUploads=useCallback(async()=>{
    if(!cfg.scriptUrl)return;
    try{const r=await api(cfg.scriptUrl,"listUploads");if(r.ok){setPendingUploads(r.files||[]);if(r.folderUrl)setUploadFolderUrl(r.folderUrl);}}catch{}
  },[cfg.scriptUrl]);

  const syncDown=useCallback(async()=>{
    if(!cfg.scriptUrl)return;
    setSyncing(true);
    try{
      const r=await api(cfg.scriptUrl,"getAll");
      if(r.ok){
        setExpenses(r.expenses||[]);
        setLmap(r.learning||{});
        if(r.payers?.length)setPayers(r.payers);
        if(r.categories?.length)setCats(r.categories);
        setAccounts(r.accounts||[]);
        setImports(r.imports||[]);
        setMatchPenalties(r.matchPenalties||{});
      }else throw new Error(r.error);
      await checkUploads();
    }catch(err){toast_("⚠️ "+err.message,"err");}
    finally{setSyncing(false);}
  },[cfg.scriptUrl,toast_,checkUploads]);

  useEffect(()=>{if(cfg.scriptUrl)syncDown();},[cfg.scriptUrl]);

  const saveExpense=async(exp)=>{
    const e={...exp,id:Date.now()+"",at:new Date().toISOString()};
    setExpenses(p=>[e,...p]);
    if(e.merchant&&e.category)setLmap(p=>({...p,[e.merchant]:e.category}));
    try{const r=await api(cfg.scriptUrl,"save",{expense:e});if(!r.ok)throw new Error(r.error);if(r.driveUrl)setExpenses(p=>p.map(x=>x.id===e.id?{...x,driveUrl:r.driveUrl}:x));toast_("✅ Salvo!");}
    catch(err){toast_("⚠️ Local: "+err.message,"err");}
    return e;
  };
  
  // Salva expense E vincula com import bancário existente
  const saveLinkedExpense=async(exp,importId)=>{
    const e={...exp,id:Date.now()+"",at:new Date().toISOString()};
    setExpenses(p=>[e,...p]);
    if(e.merchant&&e.category)setLmap(p=>({...p,[e.merchant]:e.category}));
    setImports(p=>p.map(i=>i.id===importId?{...i,status:"vinculada",expenseId:e.id}:i));
    try{
      const r=await api(cfg.scriptUrl,"save",{expense:e});
      if(!r.ok)throw new Error(r.error);
      if(r.driveUrl)setExpenses(p=>p.map(x=>x.id===e.id?{...x,driveUrl:r.driveUrl}:x));
      // Faz o link no backend
      await api(cfg.scriptUrl,"linkExpense",{expenseId:e.id,importId,accountName:e.account});
      toast_("✅ Salvo e vinculado!");
    }catch(err){toast_("⚠️ Local: "+err.message,"err");}
    return e;
  };
  
  const unlinkExpenseFn=async(expenseId,merchant,importTitle)=>{
    const exp=expenses.find(e=>e.id===expenseId);
    if(!exp||!exp.importId)return;
    const oldImpId=exp.importId;
    const oldImp=imports.find(i=>i.id===oldImpId);
    const merchantToLog=merchant||exp.merchant;
    const titleToLog=importTitle||(oldImp?oldImp.title:"");
    
    setExpenses(p=>p.map(e=>e.id===expenseId?{...e,importId:""}:e));
    setImports(p=>p.map(i=>i.id===oldImpId?{...i,status:"pendente",expenseId:""}:i));
    
    // Atualiza penalty local imediatamente (otimista)
    if(merchantToLog&&titleToLog){
      const key=normMatchKey(merchantToLog)+"|"+normMatchKey(titleToLog);
      setMatchPenalties(p=>({...p,[key]:(p[key]||0)+1}));
    }
    
    try{
      await api(cfg.scriptUrl,"unlinkExpense",{expenseId,merchant:merchantToLog,importTitle:titleToLog});
      toast_("✅ Desvinculado · sistema aprendeu");
    }catch(err){toast_("⚠️ "+err.message,"err");}
  };
  
  const linkExpenseFn=async(expenseId,importId,accountName)=>{
    setExpenses(p=>p.map(e=>e.id===expenseId?{...e,importId,account:accountName||e.account}:e));
    setImports(p=>p.map(i=>i.id===importId?{...i,status:"vinculada",expenseId}:i));
    try{
      await api(cfg.scriptUrl,"linkExpense",{expenseId,importId,accountName});
      toast_("✅ Vinculado");
    }catch(err){toast_("⚠️ "+err.message,"err");}
  };
  
  const updateExpenseFn=async(id,updates)=>{
    setExpenses(p=>p.map(e=>e.id===id?{...e,...updates}:e));
    if(updates.merchant&&updates.category){
      setLmap(p=>({...p,[updates.merchant]:updates.category}));
    }
    try{
      await api(cfg.scriptUrl,"updateExpense",{id,updates});
      toast_("✅ Atualizado");
    }catch(err){toast_("⚠️ "+err.message,"err");}
  };
  
  const saveAndReturnHome=async(exp)=>{await saveExpense(exp);setView("home");};
  const saveLinkedAndReturnHome=async(exp,importId)=>{await saveLinkedExpense(exp,importId);setView("home");};
  
  // Versão silenciosa (sem toast individual) usada no processamento em massa
  const saveBulkExpense=async(exp,importId)=>{
    const e={...exp,id:Date.now()+"_"+Math.floor(Math.random()*10000),at:new Date().toISOString(),reviewed:false};
    setExpenses(p=>[e,...p]);
    if(e.merchant&&e.category)setLmap(p=>({...p,[e.merchant]:e.category}));
    if(importId){
      setImports(p=>p.map(i=>i.id===importId?{...i,status:"vinculada",expenseId:e.id}:i));
    }
    try{
      const r=await api(cfg.scriptUrl,"save",{expense:e});
      if(!r.ok)throw new Error(r.error);
      if(r.driveUrl)setExpenses(p=>p.map(x=>x.id===e.id?{...x,driveUrl:r.driveUrl}:x));
      if(importId){
        await api(cfg.scriptUrl,"linkExpense",{expenseId:e.id,importId,accountName:e.account});
      }
      return e;
    }catch(err){
      // remove do estado local se falhou no backend
      setExpenses(p=>p.filter(x=>x.id!==e.id));
      return null;
    }
  };
  const deleteUploadFile=async(id)=>{try{await api(cfg.scriptUrl,"deleteUpload",{id});setPendingUploads(p=>p.filter(u=>u.id!==id));}catch{}};
  const finishUploadProcessing=()=>{setView("home");checkUploads();toast_("✅ Concluído!");};
  const deleteExpense=async(id)=>{setExpenses(p=>p.filter(e=>e.id!==id));try{await api(cfg.scriptUrl,"deleteExpense",{id});}catch{}toast_("✅ Excluído");};
  const addPayer=async(name)=>{setPayers(p=>[...p,name]);try{await api(cfg.scriptUrl,"addPayer",{name});}catch{}};
  const deletePayer=async(name)=>{setPayers(p=>p.filter(x=>x!==name));try{await api(cfg.scriptUrl,"deletePayer",{name});}catch{}};
  const deleteLearning=async(merchant)=>{setLmap(p=>{const n={...p};delete n[merchant];return n;});try{await api(cfg.scriptUrl,"deleteLearning",{merchant});}catch{}};
  const addCategory=async(cat)=>{setCats(p=>[...p,cat]);try{await api(cfg.scriptUrl,"addCategory",{category:cat});toast_("✅ Categoria criada!");}catch(err){toast_("⚠️ Local","err");}};
  const deleteCategory=async(name)=>{setCats(p=>p.filter(c=>c.n!==name));try{await api(cfg.scriptUrl,"deleteCategory",{name});toast_("✅ Removida");}catch{}};
  const changeUrl=(newUrl)=>{if(!newUrl?.trim())return;setCfg({scriptUrl:newUrl.trim()});setExpenses([]);setLmap({});setPayers(["Eu"]);setCats(DEFAULT_CATS);setAccounts([]);setImports([]);setMatchPenalties({});toast_("🔄 URL atualizada!");};
  
  const resetDataFn=async()=>{
    if(!confirm("⚠️ ATENÇÃO\n\nIsso vai apagar:\n• TODAS as despesas\n• TODAS as importações pendentes\n• Aprendizado de vínculos bancários\n\nMantém: pessoas, categorias, contas e aprendizado de categorias.\n\nEsta ação NÃO pode ser desfeita.\n\nTem certeza?"))return;
    if(!confirm("Última confirmação: tem certeza absoluta?"))return;
    try{
      const r=await api(cfg.scriptUrl,"resetData");
      if(!r.ok)throw new Error(r.error||"Falha");
      setExpenses([]);
      setImports([]);
      setMatchPenalties({});
      const d=r.deleted||{};
      toast_(`✅ Apagados: ${d.gastos||0} despesas, ${d.importacoes||0} importações, ${d.matchAprendizado||0} aprendizados`);
    }catch(err){
      toast_("⚠️ "+err.message,"err");
    }
  };
  
  // Mecanismo 2: move arquivo para upload/erros/
  const moveToErrorsFn=async(fileId)=>{
    if(!fileId)return;
    try{
      await api(cfg.scriptUrl,"moveToErrors",{id:fileId});
    }catch(err){
      console.error("moveToErrors falhou:",err);
    }
  };
  
  const fixPayersFn=async()=>{
    // Mapa: nome da conta → dono
    const accountByName={};
    accounts.forEach(a=>{if(a.name&&a.payer)accountByName[a.name]=a.payer;});
    
    // Acha despesas com conta vinculada e pagador errado
    const toFix=expenses.filter(e=>{
      if(!e.account)return false;
      const correctPayer=accountByName[e.account];
      if(!correctPayer)return false;
      return e.payer!==correctPayer;
    });
    
    if(toFix.length===0){toast_("✅ Nenhum pagador incorreto encontrado!");return;}
    
    // Monta preview
    let preview=`Encontradas ${toFix.length} despesa(s) com pagador incorreto:\n\n`;
    toFix.slice(0,8).forEach(e=>{
      const correct=accountByName[e.account];
      preview+=`• ${(e.merchant||"?").slice(0,25)} (${brl(e.total)})\n  ${e.account}\n  ${e.payer} → ${correct}\n\n`;
    });
    if(toFix.length>8)preview+=`... e mais ${toFix.length-8} despesas\n\n`;
    preview+=`Corrigir todas?`;
    
    if(!confirm(preview))return;
    
    // Aplica correções
    let fixed=0;
    for(const e of toFix){
      const correctPayer=accountByName[e.account];
      // Atualiza splitWith: substitui o pagador antigo pelo correto
      const newSplitWith=e.splitWith&&e.splitWith.length>0
        ?e.splitWith.map(p=>p===e.payer?correctPayer:p)
        :[correctPayer];
      try{
        await updateExpenseFn(e.id,{payer:correctPayer,splitWith:newSplitWith});
        fixed++;
      }catch{}
    }
    toast_(`✅ ${fixed} despesa(s) corrigida(s)`);
  };
  const cleanupDuplicatesFn=async()=>{
    // Agrupa por chave: estabelecimento + data + valor
    const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
    const groups={};
    for(const exp of expenses){
      const key=`${norm(exp.merchant)}|${exp.date}|${(+exp.total||0).toFixed(2)}`;
      if(!groups[key])groups[key]=[];
      groups[key].push(exp);
    }
    
    // Pega só grupos com 2+ duplicatas
    const dupGroups=Object.values(groups).filter(g=>g.length>1);
    
    if(dupGroups.length===0){
      toast_("✅ Nenhuma duplicata encontrada");
      return;
    }
    
    // Calcula totais
    const totalDupExpenses=dupGroups.reduce((s,g)=>s+g.length,0);
    const toDelete=totalDupExpenses-dupGroups.length; // mantém 1 de cada grupo
    
    // Constrói preview
    let preview=`Encontradas ${dupGroups.length} grupos de duplicatas (${totalDupExpenses} despesas no total).\n\n`;
    preview+=`Vou MANTER a mais antiga de cada grupo e APAGAR as outras (${toDelete} despesas).\n\n`;
    preview+=`Exemplos (mostrando até 5 grupos):\n`;
    dupGroups.slice(0,5).forEach((g,i)=>{
      const e=g[0];
      preview+=`\n${i+1}. ${e.merchant} · ${dtBR(e.date)} · ${brl(e.total)} → ${g.length} cópias`;
    });
    if(dupGroups.length>5)preview+=`\n... e mais ${dupGroups.length-5} grupos`;
    preview+=`\n\nProsseguir?`;
    
    if(!confirm(preview))return;
    
    // Decide quais apagar (mantém o de menor 'at' = mais antigo)
    const idsToDelete=[];
    dupGroups.forEach(group=>{
      const sorted=[...group].sort((a,b)=>(a.at||"").localeCompare(b.at||""));
      // Pula o primeiro (mantém), apaga os demais
      sorted.slice(1).forEach(e=>idsToDelete.push(e.id));
    });
    
    try{
      const r=await api(cfg.scriptUrl,"bulkDelete",{ids:idsToDelete});
      if(!r.ok)throw new Error(r.error||"Falha");
      // Atualiza estado local
      const idSet=new Set(idsToDelete);
      setExpenses(p=>p.filter(e=>!idSet.has(e.id)));
      toast_(`✅ ${r.deleted||idsToDelete.length} duplicatas removidas`);
    }catch(err){
      toast_("⚠️ "+err.message,"err");
    }
  };

  // ─── ACCOUNTS / IMPORTS ─────────────────────────────
  const addAccount=async(acc)=>{
    try{const r=await api(cfg.scriptUrl,"addAccount",{account:acc});
      if(r.ok){setAccounts(p=>[...p,{...acc,id:r.id}]);toast_("✅ Conta criada!");return r;}
      throw new Error(r.error);
    }catch(err){toast_("⚠️ "+err.message,"err");return null;}
  };
  const deleteAccountFn=async(id)=>{
    setAccounts(p=>p.filter(a=>a.id!==id));
    try{await api(cfg.scriptUrl,"deleteAccount",{id});toast_("✅ Removida");}catch{}
  };
  const uploadCsv=async(items)=>{
    try{
      // Auto-vincula matches fortes ANTES de mandar (com penalties)
      const enrichedItems=items.map(it=>{
        if(it.status!=="pendente")return it;
        const matches=findExpenseMatches(it,expenses,80,matchPenalties); // só matches fortes
        if(matches.length>0){
          // Auto-vincula
          return {...it,_autoLinkExpenseId:matches[0].exp.id};
        }
        return it;
      });
      
      const r=await api(cfg.scriptUrl,"addImports",{imports:enrichedItems.map(({_autoLinkExpenseId,...rest})=>rest)});
      if(!r.ok)throw new Error(r.error);
      
      // Após sync, faz os links automáticos
      await syncDown();
      
      // Pega imports recém-criados (matched por hash)
      const linksToCreate=enrichedItems.filter(i=>i._autoLinkExpenseId);
      if(linksToCreate.length>0){
        // Re-fetch para pegar os IDs corretos do backend
        const fresh=await api(cfg.scriptUrl,"getAll");
        if(fresh.ok){
          const accById=Object.fromEntries(accounts.map(a=>[a.id,a]));
          for(const orig of linksToCreate){
            const imp=(fresh.imports||[]).find(i=>i.hash===orig.hash);
            if(!imp)continue;
            const acc=accById[imp.accountId];
            try{
              await api(cfg.scriptUrl,"linkExpense",{
                expenseId:orig._autoLinkExpenseId,
                importId:imp.id,
                accountName:acc?.name||""
              });
            }catch{}
          }
          await syncDown();
        }
      }
      
      const linked=linksToCreate.length;
      const msg=linked>0?` (${linked} vinculadas automaticamente)`:"";
      toast_(`✅ ${r.added||0} importadas${msg}`);
      return r;
    }catch(err){toast_("⚠️ "+err.message,"err");return null;}
  };
  const updateImport=async(id,updates)=>{
    setImports(p=>p.map(i=>i.id===id?{...i,...updates}:i));
    try{await api(cfg.scriptUrl,"updateImport",{id,updates});}catch(err){toast_("⚠️ Erro: "+err.message,"err");}
  };
  const deleteImportFn=async(id)=>{
    setImports(p=>p.filter(i=>i.id!==id));
    try{await api(cfg.scriptUrl,"deleteImport",{id});}catch{}
  };
